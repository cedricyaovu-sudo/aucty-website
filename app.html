<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Aucty — Creator Auction Platform</title>
<meta name="description" content="Live creator auction platform — bid, message, and follow your favorite creators." />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
/* ========== RESET & BASE ========== */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body {
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  background: #fafafa;
  color: #0a0a0f;
  -webkit-font-smoothing: antialiased;
  line-height: 1.5;
  overflow-x: hidden;
}
body.dark-mode { background: #0a0a0f; color: #fafafa; }
a { color: inherit; text-decoration: none; }
button { font: inherit; cursor: pointer; border: none; background: none; }
img { max-width: 100%; display: block; }
input, select, textarea { font: inherit; }

/* ========== CSS VARIABLES ========== */
:root {
  --brand: #7c3aed;
  --brand-light: #a78bfa;
  --brand-dark: #5b21b6;
  --cyan: #06b6d4;
  --pink: #ff3d8a;
  --orange: #ff8a3d;
  --green: #10b981;
  --red: #ef4444;
  --yellow: #fbbf24;
  --bg: #fafafa;
  --bg-card: #ffffff;
  --bg-hover: #f3f4f6;
  --bg-input: #ffffff;
  --text: #0a0a0f;
  --text-secondary: #6b7280;
  --text-muted: #9ca3af;
  --border: #e5e7eb;
  --border-hover: #d1d5db;
  --shadow-sm: 0 1px 3px rgba(0,0,0,0.06);
  --shadow-md: 0 4px 16px rgba(0,0,0,0.08);
  --shadow-lg: 0 12px 40px rgba(0,0,0,0.12);
  --radius-sm: 8px;
  --radius-md: 12px;
  --radius-lg: 16px;
  --radius-xl: 24px;
  --radius-full: 999px;
  --gradient: linear-gradient(135deg, #7c3aed, #ec4899);
  --gradient-vibrant: linear-gradient(135deg, #ff3d8a 0%, #7c3aed 50%, #18e6c5 100%);
}
body.dark-mode {
  --bg: #0a0a0f;
  --bg-card: #141420;
  --bg-hover: #1e1e2e;
  --bg-input: #1a1a28;
  --text: #fafafa;
  --text-secondary: #9ca3af;
  --text-muted: #6b7280;
  --border: #2a2a3a;
  --border-hover: #3a3a4a;
  --shadow-sm: 0 1px 3px rgba(0,0,0,0.3);
  --shadow-md: 0 4px 16px rgba(0,0,0,0.4);
  --shadow-lg: 0 12px 40px rgba(0,0,0,0.5);
}

/* ========== AUTH OVERLAY ========== */
.auth-overlay {
  position: fixed; inset: 0; z-index: 1000;
  background: rgba(10,10,15,0.6);
  backdrop-filter: blur(12px);
  display: flex; align-items: center; justify-content: center;
  opacity: 0; pointer-events: none;
  transition: opacity 0.3s ease;
}
.auth-overlay.active { opacity: 1; pointer-events: all; }
.auth-card {
  background: var(--bg-card);
  border-radius: var(--radius-xl);
  padding: 40px;
  width: 440px;
  max-width: 95vw;
  box-shadow: var(--shadow-lg);
  border: 1px solid var(--border);
  position: relative;
  transform: translateY(20px);
  transition: transform 0.3s ease;
}
.auth-overlay.active .auth-card { transform: translateY(0); }
.auth-logo {
  font-family: 'Space Grotesk', sans-serif;
  font-size: 32px; font-weight: 800;
  text-align: center;
  margin-bottom: 8px;
}
.auth-logo span { background: var(--gradient); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; }
.auth-subtitle { text-align: center; color: var(--text-secondary); font-size: 15px; margin-bottom: 28px; }
.auth-tabs {
  display: flex; gap: 4px; padding: 4px;
  background: var(--bg-hover);
  border-radius: var(--radius-md);
  margin-bottom: 24px;
}
.auth-tab {
  flex: 1; padding: 10px; border-radius: var(--radius-sm);
  font-weight: 600; font-size: 14px; text-align: center;
  color: var(--text-secondary);
  transition: all 0.2s ease;
}
.auth-tab.active {
  background: var(--bg-card); color: var(--text);
  box-shadow: var(--shadow-sm);
}
.auth-input-group { margin-bottom: 16px; }
.auth-label {
  display: block; font-size: 13px; font-weight: 600;
  color: var(--text-secondary); margin-bottom: 6px;
  text-transform: uppercase; letter-spacing: 0.05em;
}
.auth-input {
  width: 100%; padding: 12px 14px;
  border: 1.5px solid var(--border);
  border-radius: var(--radius-sm);
  background: var(--bg-input);
  color: var(--text);
  font-size: 15px;
  transition: border-color 0.2s ease, box-shadow 0.2s ease;
  outline: none;
}
.auth-input:focus {
  border-color: var(--brand);
  box-shadow: 0 0 0 3px rgba(124,58,237,0.15);
}
.auth-btn {
  width: 100%; padding: 14px;
  border-radius: var(--radius-full);
  font-weight: 700; font-size: 15px;
  color: #fff;
  background: var(--gradient);
  border: none;
  cursor: pointer;
  margin-top: 8px;
  transition: transform 0.15s ease, box-shadow 0.15s ease;
}
.auth-btn:hover { transform: translateY(-1px); box-shadow: 0 8px 24px rgba(124,58,237,0.3); }
.auth-divider {
  display: flex; align-items: center; gap: 12px;
  color: var(--text-muted); font-size: 12px;
  margin: 20px 0;
}
.auth-divider::before, .auth-divider::after { content: ''; flex: 1; height: 1px; background: var(--border); }
.auth-social {
  display: flex; gap: 10px;
}
.auth-social-btn {
  flex: 1; padding: 12px;
  border-radius: var(--radius-sm);
  border: 1.5px solid var(--border);
  background: var(--bg-card);
  font-size: 14px; font-weight: 600;
  display: flex; align-items: center; justify-content: center; gap: 8px;
  color: var(--text);
  transition: border-color 0.2s ease, background 0.2s ease;
}
.auth-social-btn:hover { border-color: var(--border-hover); background: var(--bg-hover); }
.auth-footer { text-align: center; margin-top: 20px; font-size: 13px; color: var(--text-muted); }
.auth-footer a { color: var(--brand); font-weight: 600; }

/* ========== TOP NAV ========== */
.top-nav {
  position: sticky; top: 0; z-index: 100;
  background: rgba(255,255,255,0.85);
  backdrop-filter: saturate(1.4) blur(16px);
  -webkit-backdrop-filter: saturate(1.4) blur(16px);
  border-bottom: 1px solid var(--border);
  height: 64px;
}
body.dark-mode .top-nav {
  background: rgba(10,10,15,0.88);
}
.nav-container {
  max-width: 1440px; margin: 0 auto;
  padding: 0 24px;
  display: flex; align-items: center; height: 100%;
  gap: 24px;
}
.nav-brand {
  font-family: 'Space Grotesk', sans-serif;
  font-size: 24px; font-weight: 800;
  letter-spacing: -0.03em;
  display: flex; align-items: center; gap: 10px;
  flex-shrink: 0;
}
.nav-brand-mark {
  width: 34px; height: 34px; border-radius: 10px;
  background: var(--gradient-vibrant);
  display: grid; place-items: center;
  color: #fff; font-weight: 900; font-size: 16px;
  box-shadow: 0 4px 12px rgba(255,61,138,0.3);
}
.nav-brand span {
  background: var(--gradient); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent;
}
.nav-search {
  flex: 1; max-width: 480px; position: relative;
}
.nav-search input {
  width: 100%; padding: 10px 14px 10px 40px;
  border: 1.5px solid var(--border);
  border-radius: var(--radius-full);
  background: var(--bg-card);
  color: var(--text);
  font-size: 14px;
  outline: none;
  transition: border-color 0.2s, box-shadow 0.2s;
}
.nav-search input:focus {
  border-color: var(--brand);
  box-shadow: 0 0 0 3px rgba(124,58,237,0.12);
}
.nav-search .search-icon {
  position: absolute; left: 14px; top: 50%; transform: translateY(-50%);
  color: var(--text-muted); font-size: 16px; pointer-events: none;
}
.nav-categories {
  display: flex; gap: 6px; flex-shrink: 0;
}
.nav-cat-btn {
  padding: 7px 14px;
  border-radius: var(--radius-full);
  font-size: 13px; font-weight: 600;
  color: var(--text-secondary);
  border: 1.5px solid transparent;
  transition: all 0.2s ease;
  white-space: nowrap;
}
.nav-cat-btn:hover { color: var(--text); background: var(--bg-hover); }
.nav-cat-btn.active {
  color: var(--brand);
  background: rgba(124,58,237,0.08);
  border-color: rgba(124,58,237,0.2);
}
.nav-actions {
  display: flex; align-items: center; gap: 8px; flex-shrink: 0; margin-left: auto;
}
.nav-icon-btn {
  width: 40px; height: 40px;
  border-radius: var(--radius-sm);
  display: grid; place-items: center;
  font-size: 20px;
  color: var(--text-secondary);
  position: relative;
  transition: background 0.2s, color 0.2s;
}
.nav-icon-btn:hover { background: var(--bg-hover); color: var(--text); }
.nav-icon-btn .badge {
  position: absolute; top: 4px; right: 4px;
  width: 18px; height: 18px;
  background: var(--red);
  color: #fff;
  font-size: 10px; font-weight: 800;
  border-radius: 50%;
  display: grid; place-items: center;
  border: 2px solid var(--bg);
}
.nav-avatar {
  width: 36px; height: 36px;
  border-radius: 50%;
  background: var(--gradient);
  display: grid; place-items: center;
  color: #fff; font-weight: 700; font-size: 14px;
  cursor: pointer;
  border: 2px solid transparent;
  transition: border-color 0.2s;
}
.nav-avatar:hover { border-color: var(--brand); }
.sell-btn {
  padding: 9px 18px;
  border-radius: var(--radius-full);
  font-weight: 700; font-size: 13px;
  color: #fff;
  background: var(--gradient);
  transition: transform 0.15s, box-shadow 0.15s;
}
.sell-btn:hover { transform: translateY(-1px); box-shadow: 0 6px 20px rgba(124,58,237,0.3); }

/* ========== SIDEBAR ========== */
.app-layout {
  display: flex;
  max-width: 1440px;
  margin: 0 auto;
  min-height: calc(100vh - 64px);
}
.sidebar {
  width: 220px;
  padding: 16px 12px;
  border-right: 1px solid var(--border);
  position: sticky; top: 64px;
  height: calc(100vh - 64px);
  overflow-y: auto;
  flex-shrink: 0;
  background: var(--bg);
}
.sidebar::-webkit-scrollbar { width: 3px; }
.sidebar::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
.sidebar-section { margin-bottom: 24px; }
.sidebar-title {
  font-size: 11px; font-weight: 700;
  text-transform: uppercase; letter-spacing: 0.1em;
  color: var(--text-muted); padding: 0 10px; margin-bottom: 6px;
}
.sidebar-item {
  display: flex; align-items: center; gap: 10px;
  padding: 9px 10px;
  border-radius: var(--radius-sm);
  font-size: 14px; font-weight: 500;
  color: var(--text-secondary);
  transition: all 0.15s ease;
  cursor: pointer;
}
.sidebar-item:hover { background: var(--bg-hover); color: var(--text); }
.sidebar-item.active {
  background: rgba(124,58,237,0.08);
  color: var(--brand); font-weight: 600;
}
.sidebar-item .icon { font-size: 18px; width: 24px; text-align: center; }
.sidebar-item .sidebar-badge {
  margin-left: auto;
  background: var(--red);
  color: #fff; font-size: 10px; font-weight: 800;
  padding: 2px 6px; border-radius: var(--radius-full);
}

.sidebar-creators { margin-top: 8px; }
.sidebar-creator {
  display: flex; align-items: center; gap: 10px;
  padding: 8px 10px;
  border-radius: var(--radius-sm);
  cursor: pointer;
  transition: background 0.15s;
}
.sidebar-creator:hover { background: var(--bg-hover); }
.sidebar-creator-ava {
  width: 30px; height: 30px; border-radius: 50%;
  display: grid; place-items: center;
  color: #fff; font-weight: 700; font-size: 11px;
  flex-shrink: 0;
  position: relative;
}
.sidebar-creator-ava .live-dot {
  position: absolute; bottom: -1px; right: -1px;
  width: 10px; height: 10px;
  background: var(--red);
  border-radius: 50%;
  border: 2px solid var(--bg);
  animation: pulse 2s infinite;
}
@keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
.sidebar-creator-name {
  font-size: 13px; font-weight: 600;
  color: var(--text);
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.sidebar-creator-tag {
  font-size: 11px; color: var(--text-muted);
}

/* ========== MAIN CONTENT ========== */
.main-content {
  flex: 1;
  padding: 24px;
  overflow-y: auto;
  min-width: 0;
}
.main-content > .page { display: none; }
.main-content > .page.active { display: block; }

/* ========== SECTION HEADERS ========== */
.section-header {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 16px;
}
.section-title {
  font-family: 'Space Grotesk', sans-serif;
  font-size: 22px; font-weight: 700;
  letter-spacing: -0.02em;
}
.section-see-all {
  font-size: 13px; font-weight: 600;
  color: var(--brand);
  display: flex; align-items: center; gap: 4px;
  transition: opacity 0.2s;
}
.section-see-all:hover { opacity: 0.7; }

/* ========== LIVE STREAMS BANNER ========== */
.live-banner {
  background: linear-gradient(135deg, #1a0533, #0a0514);
  border-radius: var(--radius-xl);
  padding: 32px;
  margin-bottom: 28px;
  position: relative;
  overflow: hidden;
  color: #fff;
}
.live-banner::before {
  content: ''; position: absolute; inset: 0;
  background: radial-gradient(circle at 20% 30%, rgba(255,61,138,0.2), transparent 50%),
              radial-gradient(circle at 80% 60%, rgba(124,58,237,0.25), transparent 50%);
  pointer-events: none;
}
.live-banner-content { position: relative; z-index: 1; }
.live-banner .live-tag {
  display: inline-flex; align-items: center; gap: 6px;
  background: var(--red); color: #fff;
  padding: 5px 12px; border-radius: var(--radius-full);
  font-size: 12px; font-weight: 800;
  letter-spacing: 0.06em;
  margin-bottom: 12px;
}
.live-tag .dot { width: 6px; height: 6px; background: #fff; border-radius: 50%; animation: pulse 1.5s infinite; }
.live-banner h2 {
  font-family: 'Space Grotesk', sans-serif;
  font-size: 28px; font-weight: 800;
  letter-spacing: -0.02em;
  margin-bottom: 8px;
}
.live-banner p { color: rgba(255,255,255,0.7); font-size: 15px; max-width: 480px; }
.live-streams-row {
  display: flex; gap: 16px; margin-top: 20px;
  overflow-x: auto; padding-bottom: 4px;
  scrollbar-width: none;
}
.live-streams-row::-webkit-scrollbar { display: none; }

/* ========== STREAM CARDS ========== */
.stream-card {
  flex: 0 0 240px;
  border-radius: var(--radius-lg);
  overflow: hidden;
  cursor: pointer;
  transition: transform 0.2s ease;
  position: relative;
}
.stream-card:hover { transform: translateY(-4px); }
.stream-thumb {
  height: 320px;
  position: relative;
  overflow: hidden;
}
.stream-thumb-bg {
  width: 100%; height: 100%;
  object-fit: cover;
}
.stream-thumb-gradient {
  position: absolute; inset: 0;
  background: linear-gradient(180deg, transparent 40%, rgba(0,0,0,0.85) 100%);
}
.stream-live-badge {
  position: absolute; top: 10px; left: 10px;
  display: flex; align-items: center; gap: 5px;
  background: var(--red); color: #fff;
  padding: 3px 8px; border-radius: var(--radius-full);
  font-size: 11px; font-weight: 800;
}
.stream-live-badge .dot { width: 5px; height: 5px; background: #fff; border-radius: 50%; animation: pulse 1.5s infinite; }
.stream-viewers {
  position: absolute; top: 10px; right: 10px;
  background: rgba(0,0,0,0.55); color: #fff;
  padding: 3px 8px; border-radius: var(--radius-full);
  font-size: 11px; font-weight: 600;
  backdrop-filter: blur(6px);
}
.stream-info {
  position: absolute; bottom: 0; left: 0; right: 0;
  padding: 14px;
  color: #fff;
}
.stream-creator {
  display: flex; align-items: center; gap: 8px;
  margin-bottom: 6px;
}
.stream-creator-ava {
  width: 28px; height: 28px; border-radius: 50%;
  border: 2px solid #fff;
  display: grid; place-items: center;
  font-size: 11px; font-weight: 700;
}
.stream-creator-name { font-size: 13px; font-weight: 700; }
.stream-creator-verified { color: var(--cyan); font-size: 12px; }
.stream-title { font-size: 14px; font-weight: 600; line-height: 1.3; }
.stream-category {
  display: inline-block;
  background: rgba(255,255,255,0.15);
  padding: 2px 8px; border-radius: var(--radius-full);
  font-size: 11px; font-weight: 600;
  margin-top: 6px;
  backdrop-filter: blur(4px);
}

/* ========== AUCTION GRID ========== */
.auction-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
  gap: 16px;
  margin-bottom: 32px;
}
.auction-card {
  background: var(--bg-card);
  border-radius: var(--radius-lg);
  border: 1px solid var(--border);
  overflow: hidden;
  cursor: pointer;
  transition: transform 0.2s, box-shadow 0.2s, border-color 0.2s;
}
.auction-card:hover {
  transform: translateY(-4px);
  box-shadow: var(--shadow-md);
  border-color: var(--border-hover);
}
.auction-img {
  height: 200px;
  position: relative;
  overflow: hidden;
}
.auction-img-bg {
  width: 100%; height: 100%; object-fit: cover;
}
.auction-img-placeholder {
  width: 100%; height: 100%;
  display: grid; place-items: center;
  font-size: 48px;
}
.auction-badges {
  position: absolute; top: 10px; left: 10px;
  display: flex; gap: 6px;
}
.auction-badge {
  padding: 3px 8px; border-radius: var(--radius-full);
  font-size: 10px; font-weight: 800;
  letter-spacing: 0.04em; text-transform: uppercase;
}
.badge-live { background: var(--red); color: #fff; }
.badge-hot { background: var(--orange); color: #fff; }
.badge-ending { background: var(--yellow); color: #0a0514; }
.badge-new { background: var(--cyan); color: #fff; }
.auction-heart {
  position: absolute; top: 10px; right: 10px;
  width: 32px; height: 32px;
  background: rgba(255,255,255,0.9);
  border-radius: 50%;
  display: grid; place-items: center;
  font-size: 16px;
  transition: transform 0.15s;
  backdrop-filter: blur(6px);
}
body.dark-mode .auction-heart { background: rgba(0,0,0,0.5); }
.auction-heart:hover { transform: scale(1.15); }
.auction-heart.liked { color: var(--red); }
.auction-body { padding: 14px; }
.auction-creator-row {
  display: flex; align-items: center; gap: 8px;
  margin-bottom: 8px;
}
.auction-creator-ava {
  width: 24px; height: 24px; border-radius: 50%;
  display: grid; place-items: center;
  color: #fff; font-weight: 700; font-size: 10px;
}
.auction-creator-name {
  font-size: 12px; font-weight: 600;
  color: var(--text-secondary);
}
.auction-title {
  font-size: 15px; font-weight: 700;
  color: var(--text);
  margin-bottom: 8px;
  line-height: 1.3;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
}
.auction-price-row {
  display: flex; align-items: flex-end; justify-content: space-between;
}
.auction-price-label {
  font-size: 11px; color: var(--text-muted);
  text-transform: uppercase; letter-spacing: 0.06em; font-weight: 600;
}
.auction-price {
  font-family: 'Space Grotesk', sans-serif;
  font-size: 20px; font-weight: 800;
  color: var(--text);
  letter-spacing: -0.02em;
}
.auction-timer {
  font-size: 12px; font-weight: 700;
  color: var(--cyan);
  background: rgba(6,182,212,0.1);
  padding: 4px 10px;
  border-radius: var(--radius-sm);
}
.auction-bids {
  font-size: 12px; color: var(--text-muted);
  margin-top: 8px;
}
.auction-bid-btn {
  width: 100%; margin-top: 10px;
  padding: 10px;
  border-radius: var(--radius-sm);
  background: var(--gradient);
  color: #fff;
  font-weight: 700; font-size: 13px;
  text-align: center;
  transition: transform 0.15s, box-shadow 0.15s;
}
.auction-bid-btn:hover { transform: translateY(-1px); box-shadow: 0 4px 12px rgba(124,58,237,0.3); }

/* ========== CATEGORY PILLS ========== */
.category-pills {
  display: flex; gap: 8px; margin-bottom: 24px;
  overflow-x: auto; padding-bottom: 4px;
  scrollbar-width: none;
}
.category-pills::-webkit-scrollbar { display: none; }
.cat-pill {
  padding: 8px 18px;
  border-radius: var(--radius-full);
  border: 1.5px solid var(--border);
  background: var(--bg-card);
  font-size: 13px; font-weight: 600;
  color: var(--text-secondary);
  white-space: nowrap;
  transition: all 0.2s;
  cursor: pointer;
}
.cat-pill:hover { border-color: var(--border-hover); color: var(--text); }
.cat-pill.active {
  background: var(--brand);
  border-color: var(--brand);
  color: #fff;
}

/* ========== AUCTION DETAIL MODAL ========== */

.detail-modal {

/* ========== BIDS PAGE ========== */

/* ========== MESSAGES PAGE ========== */
.messages-layout {

}

}

}
.message-item {

  padding: 14px 16px;

  transition: background 0.15s;
  border-bottom: 1px solid var(--border);
}
.message-item:hover, .message-item.active { background: var(--bg-hover); }
.message-ava {

}
.message-info { flex: 1; min-width: 0; }
.message-name { font-size: 14px; font-weight: 700; color: var(--text); }

}

}

}

}
.chat-bubble {

}

}

}
.chat-input-row {
  padding: 12px 16px;
  border-top: 1px solid var(--border);
  display: flex; gap: 10px;
}
.chat-input {
  flex: 1; padding: 10px 14px;
  border: 1.5px solid var(--border);
  border-radius: var(--radius-full);
  background: var(--bg);
  color: var(--text);
  font-size: 14px; outline: none;
}
.chat-input:focus { border-color: var(--brand); }
.chat-send-btn {
  width: 40px; height: 40px;
  border-radius: 50%;

  color: #fff;
  display: grid; place-items: center;
  font-size: 18px;
}

/* ========== PROFILE PAGE ========== */
.profile-header {
  position: relative;
  margin-bottom: 24px;
}
.profile-banner {
  height: 200px;
  border-radius: var(--radius-xl);
  overflow: hidden;
  position: relative;
}
.profile-banner-bg {

}
.profile-info {
  display: flex; align-items: flex-start; gap: 20px;
  margin-top: -48px;
  padding: 0 24px;
  position: relative; z-index: 1;
}
.profile-ava {
  width: 96px; height: 96px;
  border-radius: 50%;
  border: 4px solid var(--bg-card);

}

}

.profile-bio { font-size: 14px; color: var(--text-secondary); margin-top: 8px; max-width: 500px; }
.profile-stats-row {
  display: flex; gap: 24px; margin-top: 12px;
}
.profile-stat { text-align: center; }
.profile-stat-num { font-family: 'Space Grotesk'; font-size: 18px; font-weight: 800; }

}

  background: var(--bg-card);
  transition: all 0.2s;
}
.profile-edit-btn:hover { border-color: var(--brand); color: var(--brand); }

/* ========== SETTINGS ========== */
.settings-list { max-width: 600px; }
.settings-group {
  margin-bottom: 24px;
}
.settings-group-title {
  font-size: 13px; font-weight: 700;
  text-transform: uppercase; letter-spacing: 0.06em;
  color: var(--text-muted); margin-bottom: 10px;
}
.settings-item {
  display: flex; align-items: center; justify-content: space-between;
  padding: 14px;
  border-radius: var(--radius-md);
  border: 1px solid var(--border);
  margin-bottom: 8px;
  cursor: pointer;
  transition: background 0.15s;
}
.settings-item:hover { background: var(--bg-hover); }
.settings-item-left {
  display: flex; align-items: center; gap: 12px;
}
.settings-item-icon {
  width: 36px; height: 36px;
  border-radius: var(--radius-sm);
  background: var(--bg-hover);
  display: grid; place-items: center;
  font-size: 18px;
}
.settings-item-label { font-size: 14px; font-weight: 600; }
.settings-item-desc { font-size: 12px; color: var(--text-muted); }
.settings-arrow { color: var(--text-muted); font-size: 18px; }

/* Settings Panel Modal */
.settings-panel-overlay {
  position: fixed; inset: 0; z-index: 600;
  background: rgba(10,10,15,0.5);
  backdrop-filter: blur(8px);
  display: flex; align-items: center; justify-content: center;
  opacity: 0; pointer-events: none;
  transition: opacity 0.3s;
}
.settings-panel-overlay.active { opacity: 1; pointer-events: all; }
.settings-panel {
  background: var(--bg-card);
  border-radius: var(--radius-xl);
  width: 520px; max-width: 95vw;
  max-height: 85vh;
  overflow-y: auto;
  box-shadow: var(--shadow-lg);
  border: 1px solid var(--border);
  padding: 28px;
}
.settings-panel::-webkit-scrollbar { width: 4px; }
.settings-panel::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
.sp-header {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 24px;
}
.sp-header h3 { font-size: 20px; font-weight: 700; }
.sp-close {
  width: 36px; height: 36px;
  border-radius: var(--radius-full);
  border: 1px solid var(--border);
  background: var(--bg-hover);
  display: grid; place-items: center;
  cursor: pointer; font-size: 18px;
  transition: all 0.15s;
}
.sp-close:hover { background: var(--border); }
.sp-field { margin-bottom: 18px; }
.sp-label {
  font-size: 12px; font-weight: 700;
  text-transform: uppercase; letter-spacing: 0.06em;
  color: var(--text-muted); margin-bottom: 6px;
}
.sp-input {
  width: 100%; padding: 12px 14px;
  border-radius: var(--radius-md);
  border: 1.5px solid var(--border);
  background: var(--bg-main);
  color: var(--text);
  font-size: 14px;
  transition: border-color 0.2s;
}
.sp-input:focus { outline: none; border-color: var(--brand); }
textarea.sp-input { min-height: 80px; resize: vertical; font-family: inherit; }
.sp-btn {
  width: 100%; padding: 14px;
  border-radius: var(--radius-md);
  border: none;
  background: var(--gradient);
  color: #fff; font-weight: 700; font-size: 15px;
  cursor: pointer;
  transition: transform 0.1s, box-shadow 0.2s;
}
.sp-btn:hover { transform: translateY(-1px); box-shadow: var(--shadow-md); }
.sp-btn:active { transform: scale(0.98); }
.sp-btn.secondary {
  background: var(--bg-hover);
  color: var(--text);
  border: 1.5px solid var(--border);
}
.sp-btn.danger { background: var(--red); }
.sp-divider { height: 1px; background: var(--border); margin: 20px 0; }
.sp-info-row {
  display: flex; justify-content: space-between; align-items: center;
  padding: 12px 0;
  border-bottom: 1px solid var(--border);
}
.sp-info-row:last-child { border-bottom: none; }
.sp-info-label { font-size: 14px; color: var(--text-muted); }
.sp-info-value { font-size: 14px; font-weight: 600; }
.sp-toggle-row {
  display: flex; justify-content: space-between; align-items: center;
  padding: 14px 0;
  border-bottom: 1px solid var(--border);
}
.sp-toggle-label { font-size: 14px; font-weight: 600; }
.sp-toggle-desc { font-size: 12px; color: var(--text-muted); margin-top: 2px; }
.sp-section-title {
  font-size: 13px; font-weight: 700;
  text-transform: uppercase; letter-spacing: 0.06em;
  color: var(--text-muted); margin: 20px 0 10px;
}
.sp-empty {
  text-align: center; padding: 32px 16px;
  color: var(--text-muted); font-size: 14px;
}
.sp-card {
  padding: 14px;
  border-radius: var(--radius-md);
  border: 1px solid var(--border);
  margin-bottom: 10px;
}
.sp-card-row { display: flex; justify-content: space-between; align-items: center; }
.sp-badge {
  display: inline-block; padding: 4px 10px;
  border-radius: var(--radius-full);
  font-size: 11px; font-weight: 700;
  text-transform: uppercase;
}
.sp-badge.green { background: rgba(16,185,129,0.15); color: var(--green); }
.sp-badge.orange { background: rgba(245,158,11,0.15); color: #f59e0b; }
.sp-badge.blue { background: rgba(99,102,241,0.15); color: var(--brand); }
.sp-avatar-upload {
  width: 80px; height: 80px;
  border-radius: var(--radius-full);
  background: var(--gradient);
  display: grid; place-items: center;
  font-size: 32px; cursor: pointer;
  margin: 0 auto 16px;
  position: relative;
  overflow: hidden;
}
.sp-avatar-upload:hover::after {
  content: '📷';
  position: absolute; inset: 0;
  background: rgba(0,0,0,0.5);
  display: grid; place-items: center;
  font-size: 24px;
}

/* Toggle switch */
.toggle {
  position: relative;
  width: 44px; height: 24px;
  background: var(--border);
  border-radius: 12px;
  cursor: pointer;
  transition: background 0.2s;
}
.toggle.active { background: var(--brand); }
.toggle::after {
  content: '';
  position: absolute;
  top: 3px; left: 3px;
  width: 18px; height: 18px;
  background: #fff;
  border-radius: 50%;
  transition: transform 0.2s;
}
.toggle.active::after { transform: translateX(20px); }

/* ========== EMPTY STATE ========== */
.empty-state {
  text-align: center; padding: 60px 20px;
}
.empty-state .icon { font-size: 48px; margin-bottom: 16px; }
.empty-state h3 { font-size: 18px; font-weight: 700; margin-bottom: 8px; }
.empty-state p { font-size: 14px; color: var(--text-muted); max-width: 360px; margin: 0 auto; }

/* ========== TOAST ========== */
.toast {
  position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(100px);
  padding: 14px 24px;
  border-radius: var(--radius-md);
  font-size: 14px; font-weight: 600;
  z-index: 2000;
  transition: transform 0.3s ease;
  box-shadow: var(--shadow-lg);
}
.toast.show { transform: translateX(-50%) translateY(0); }
.toast.success { background: var(--green); color: #fff; }
.toast.error { background: var(--red); color: #fff; }
.toast.info { background: var(--brand); color: #fff; }

/* ========== RESPONSIVE ========== */
@media (max-width: 1024px) {
  .sidebar { display: none; }
  .detail-grid { grid-template-columns: 1fr; }
  .messages-layout { grid-template-columns: 1fr; }
}
@media (max-width: 768px) {
  .nav-categories { display: none; }
  .nav-search { max-width: 240px; }
  .auction-grid { grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); }
}

/* ========== CREATOR PROFILE PAGE ========== */
.cp-banner {
  height: 180px;
  border-radius: var(--radius-xl);
  overflow: hidden;
  position: relative;
}
.cp-back {
  position: absolute; top: 16px; left: 16px; z-index: 2;
  width: 36px; height: 36px; border-radius: 50%;
  background: rgba(0,0,0,0.4); backdrop-filter: blur(8px);
  display: grid; place-items: center; color: #fff; font-size: 18px;
  cursor: pointer; transition: background 0.2s;
}
.cp-back:hover { background: rgba(0,0,0,0.6); }
.cp-top {

function computeTimeLeft(endsAt) {
  if (!endsAt) return '--';
  const ms = new Date(endsAt).getTime() - Date.now();
  if (ms <= 0) return 'Ended';
  const d = Math.floor(ms / 86400000);
  const h = Math.floor((ms % 86400000) / 3600000);
  const m = Math.floor((ms % 3600000) / 60000);
  if (d > 0) return d + 'd ' + h + 'h';
  if (h > 0) return h + 'h ' + m + 'm';
  return m + 'm';
}

function computeBadge(row) {
  if (!row) return '';
  if (row.hot) return 'hot';
  if (row.featured) return 'live';
  const ms = new Date(row.ends_at).getTime() - Date.now();
  if (ms > 0 && ms < 3600000) return 'ending'; // < 1 hour
  const created = new Date(row.created_at).getTime();
  if (Date.now() - created < 86400000) return 'new'; // < 24h old
  return '';
}

function getInitials(name) {
  if (!name) return '?';
  const p = name.trim().split(/\s+/);
  return p.length > 1 ? (p[0][0] + p[p.length-1][0]).toUpperCase() : name.substring(0,2).toUpperCase();
}

function avatarColor(id) {
  if (!id) return '#7c3aed';
  const cols = ['#ff3d8a','#7c3aed','#06b6d4','#ff8a3d','#10b981','#fbbf24','#ec4899','#8b5cf6','#f43f5e','#3b82f6','#14b8a6','#6366f1','#a855f7','#d946ef','#f97316','#84cc16'];
  let h = 0;
  for (let i = 0; i < id.length; i++) { h = ((h << 5) - h) + id.charCodeAt(i); h = h & h; }
  return cols[Math.abs(h) % cols.length];
}

  if (!p) return { id:'', name:'Unknown', handle:'@unknown', avatar:'#7c3aed', initials:'?', followers:'0', items:0, verified:false, bio:'', isLive:false, avatarUrl:null };
  const fc = p.follower_count || 0;

    handle: '@' + (p.username || 'user'),
    avatar: avatarColor(p.id),
    initials: getInitials(p.display_name || p.username),

    avatarUrl: p.avatar_url || null,
    rating: p.rating || 5.0,
    reviewCount: p.review_count || 0
  };
}

function mapAuction(row, creatorProfile) {
  const priceCents = row.current_bid_cents || row.starting_price_cents || 0;

      const { data: auctionCounts } = await sb.from('auctions').select('creator_id').in('creator_id', creatorIds).eq('status', 'active');
      const countMap = {};
      (auctionCounts || []).forEach(a => { countMap[a.creator_id] = (countMap[a.creator_id] || 0) + 1; });

      creators = data.map(p => {
        const c = mapCreator(p);
        c.items = countMap[p.id] || 0;
        c.isLive = (countMap[p.id] || 0) > 0;
        return c;
      });
    } else {
      creators = [];
    }
  } catch(e) { console.error('loadCreators:', e); creators = []; }
}

async function loadAuctions() {
  try {
    const { data } = await sb.from('auctions').select('*, profiles!auctions_creator_id_fkey(*)').in('status', ['active','ended','sold','scheduled']).order('created_at', { ascending: false }).limit(50);
    if (data && data.length > 0) {
      auctions = data.map(row => {
        const profile = row.profiles;
        return mapAuction(row, profile);
      });
    } else {
      auctions = [];
    }
  } catch(e) { console.error('loadAuctions:', e); auctions = []; }
}

async function loadMyBids() {
  if (!state.user) return;
  try {
    const { data } = await sb.from('bids').select('*, auctions(*, profiles!auctions_creator_id_fkey(*))').eq('bidder_id', state.user.id).order('created_at', { ascending: false }).limit(50);
    if (data && data.length > 0) {
      myBids = data.map(b => {
        const aRow = b.auctions;
        const profile = aRow ? aRow.profiles : null;
        const auction = aRow ? mapAuction(aRow, profile) : null;
        const timeDiff = Date.now() - new Date(b.created_at).getTime();
        let timeAgo = '';
        if (timeDiff < 60000) timeAgo = 'just now';
        else if (timeDiff < 3600000) timeAgo = Math.floor(timeDiff/60000) + 'm ago';
        else if (timeDiff < 86400000) timeAgo = Math.floor(timeDiff/3600000) + 'h ago';
        else timeAgo = Math.floor(timeDiff/86400000) + 'd ago';
        return {
          auction: auction,
          amount: Math.round(b.amount_cents / 100),
          status: b.status === 'active' ? 'winning' : b.status,
          time: timeAgo
        };
      }).filter(b => b.auction);
    } else {
      myBids = [];
    }
  } catch(e) { console.error('loadMyBids:', e); myBids = []; }
}

async function loadWatchlist() {
  if (!state.user) return;
  try {
    const { data } = await sb.from('watchlist').select('auction_id').eq('user_id', state.user.id);
    state.watchlist = new Set((data || []).map(w => w.auction_id));
  } catch(e) { console.error('loadWatchlist:', e); }
}

async function loadFollowing() {
  if (!state.user) return;
  try {
    const { data } = await sb.from('follows').select('following_id').eq('follower_id', state.user.id);
    state.following = new Set((data || []).map(f => f.following_id));
  } catch(e) { console.error('loadFollowing:', e); }
}

async function loadConversations() {
  if (!state.user) return;
  try {
    const { data } = await sb.from('conversations')
      .select('*, participant1:profiles!conversations_participant_1_fkey(*), participant2:profiles!conversations_participant_2_fkey(*)')
      .or('participant_1.eq.' + state.user.id + ',participant_2.eq.' + state.user.id)
      .order('last_message_at', { ascending: false })
      .limit(20);

    if (data && data.length > 0) {
      // Load last message for each
      const convIds = data.map(c => c.id);
      const { data: msgs } = await sb.from('messages').select('*').in('conversation_id', convIds).order('created_at', { ascending: false });

      const lastMsgMap = {};
      const allMsgsMap = {};
      (msgs || []).forEach(m => {
        if (!lastMsgMap[m.conversation_id]) lastMsgMap[m.conversation_id] = m;
        if (!allMsgsMap[m.conversation_id]) allMsgsMap[m.conversation_id] = [];
        allMsgsMap[m.conversation_id].push(m);
      });

      unreadMsgCount = 0;
      conversations = data.map(c => {
        const other = c.participant_1 === state.user.id ? c.participant2 : c.participant1;
        const lastMsg = lastMsgMap[c.id];
        const allMsgs = (allMsgsMap[c.id] || []).reverse();
        const hasUnread = lastMsg && lastMsg.sender_id !== state.user.id && !lastMsg.read_at;
        if (hasUnread) unreadMsgCount++;

        const timeDiff = lastMsg ? (Date.now() - new Date(lastMsg.created_at).getTime()) : 0;
        let timeStr = '';
        if (timeDiff < 60000) timeStr = 'now';
        else if (timeDiff < 3600000) timeStr = Math.floor(timeDiff/60000) + 'm';
        else if (timeDiff < 86400000) timeStr = Math.floor(timeDiff/3600000) + 'h';
        else timeStr = Math.floor(timeDiff/86400000) + 'd';

        return {
          id: c.id,
          rawId: c.id,
          user: mapCreator(other),
          lastMsg: lastMsg ? lastMsg.content : '',
          time: timeStr,
          unread: hasUnread,
          messages: allMsgs.map(m => ({
            from: m.sender_id === state.user.id ? 'me' : 'them',
            text: m.content
          }))
        };
      });
    } else {
      conversations = [];
    }
  } catch(e) { console.error('loadConversations:', e); conversations = []; }
}

async function loadNotifications() {
  if (!state.user) return;
  try {
    const { count } = await sb.from('notifications').select('*', { count: 'exact', head: true }).eq('user_id', state.user.id).is('read_at', null);
    unreadNotifCount = count || 0;
  } catch(e) { console.error('loadNotifications:', e); }
}

async function loadAllData() {
  await Promise.all([
    loadCreators(),
    loadAuctions(),
    loadMyBids(),
    loadWatchlist(),
    loadFollowing(),
    loadConversations(),
    loadNotifications()
  ]);
}

        ` : ''}
        <div class="auth-input-group">

        </div>

        </div>
        ${state.loading ? '<div style="text-align:center;padding:12px;color:var(--text-muted);">Loading...</div>' : ''}
        <button class="auth-btn" id="authSubmit" ${state.loading ? 'disabled' : ''}>${isSignup ? 'Create Account' : 'Sign In'}</button>
        <div class="auth-divider">or continue with</div>
        <div class="auth-social">
          <button class="auth-social-btn" id="authGoogle">\u{1F535} Google</button>
          <button class="auth-social-btn" id="authApple">\u{1F34E} Apple</button>
        </div>
        <div class="auth-footer">
          ${isSignup
            ? 'Already have an account? <a href="#" id="authSwitch">Sign in</a>'
            : 'Don\'t have an account? <a href="#" id="authSwitch">Sign up</a>'}
        </div>
      </div>
    </div>
  `;

function bindAuthEvents() {
  $$('.auth-tab').forEach(tab => {
    tab.addEventListener('click', () => {
      state.authMode = tab.dataset.tab === 'signup' ? 'signup' : 'signin';
      render();
    });
  });
  const sw = $('#authSwitch');
  if (sw) sw.addEventListener('click', e => {
    e.preventDefault();
    state.authMode = state.authMode === 'signin' ? 'signup' : 'signin';
    render();
  });

  $('#authSubmit').addEventListener('click', async () => {
    const email = $('#authEmail')?.value?.trim();
    const password = $('#authPassword')?.value;
    if (!email) { showToast('Please enter your email', 'error'); return; }
    if (!password || password.length < 6) { showToast('Password must be at least 6 characters', 'error'); return; }

    state.loading = true;
    render();

    try {
      if (state.authMode === 'signup') {
        const displayName = $('#authName')?.value?.trim() || '';
        const username = $('#authUsername')?.value?.trim() || '';
        const { data, error } = await sb.auth.signUp({
          email, password,
          options: { data: { display_name: displayName, username: username } }
        });
        if (error) throw error;
        if (data.user && !data.session) {
          state.loading = false;
          showToast('Check your email to confirm your account!', 'success');
          state.authMode = 'signin';
          render();
          return;
        }
        // Auto-confirmed (or email confirmation disabled)
        showToast('Welcome to Aucty!', 'success');
      } else {
        const { data, error } = await sb.auth.signInWithPassword({ email, password });
        if (error) throw error;
        showToast('Welcome back!', 'success');
      }
    } catch(e) {
      state.loading = false;
      showToast(e.message || 'Authentication failed', 'error');
      render();
    }
  });

  const googleBtn = $('#authGoogle');
  if (googleBtn) googleBtn.addEventListener('click', async () => {
    try {
      const { error } = await sb.auth.signInWithOAuth({
        provider: 'google',
        options: { redirectTo: window.location.origin + window.location.pathname }
      });
      if (error) throw error;
    } catch(e) { showToast('Google sign in failed: ' + e.message, 'error'); }
  });

  const appleBtn = $('#authApple');
  if (appleBtn) appleBtn.addEventListener('click', async () => {
    try {
      const { error } = await sb.auth.signInWithOAuth({
        provider: 'apple',
        options: { redirectTo: window.location.origin + window.location.pathname }
      });
      if (error) throw error;
    } catch(e) { showToast('Apple sign in failed: ' + e.message, 'error'); }
  });
}

// ========== BIDS PAGE ==========
function renderBids() {
  const tabs = ['active', 'won', 'lost'];
  const filtered = state.bidTab === 'active'
    ? myBids.filter(b => b.status === 'winning' || b.status === 'active' || b.status === 'outbid')
    : state.bidTab === 'won'
    ? myBids.filter(b => b.status === 'won')
    : myBids.filter(b => b.status === 'lost');

  return `
    <div class="section-header">
      <h2 class="section-title">My Bids</h2>
    </div>
    <div class="bids-tabs">
      ${tabs.map(t => `<button class="bids-tab ${state.bidTab === t ? 'active' : ''}" data-bid-tab="${t}">${t.charAt(0).toUpperCase() + t.slice(1)}</button>`).join('')}
    </div>
    ${filtered.length === 0 ? `
      <div class="empty-state">
        <div class="icon">\u{1F3AF}</div>
        <h3>No ${state.bidTab} bids</h3>
        <p>Start bidding on auctions to see them here.</p>
      </div>
    ` : filtered.map(b => `
      <div class="bid-item" onclick="openDetail('${b.auction.id}')">
        <div class="bid-thumb">
          <div style="width:100%;height:100%;display:grid;place-items:center;font-size:28px;background:linear-gradient(135deg, ${b.auction.creator.avatar}15, ${b.auction.creator.avatar}30);border-radius:var(--radius-sm);">${b.auction.imageUrl ? '<img src="' + b.auction.imageUrl + '" style="width:100%;height:100%;object-fit:cover;border-radius:var(--radius-sm);">' : b.auction.image}</div>
        </div>
        <div class="bid-info">
          <div class="bid-title">${b.auction.title}</div>
          <div class="bid-seller">${b.auction.creator.name} · ${b.time}</div>
        </div>
        <div>
          <div class="bid-amount" style="color:var(--text);">${formatPrice(b.amount)}</div>
          <div class="bid-status ${b.status}">${b.status === 'winning' || b.status === 'active' ? '\u{1F7E2} Winning' : b.status === 'outbid' ? '\u{1F534} Outbid' : '\u{1F7E3} Won'}</div>
        </div>
      </div>
    `).join('')}
  `;
}

// ========== MESSAGES PAGE ==========
function renderMessages() {
  if (conversations.length === 0) {
    return `
      <div class="section-header"><h2 class="section-title">Messages</h2></div>
      <div class="empty-state">
        <div class="icon">\u{1F4AC}</div>
        <h3>No messages yet</h3>
        <p>Start a conversation with a creator by visiting their profile.</p>
      </div>
    `;
  }
  const chatIdx = Math.min(state.selectedChat, conversations.length - 1);
  const chat = conversations[chatIdx];
  if (!chat) return '<div class="empty-state"><h3>No conversations</h3></div>';
  return `
    <div class="messages-layout">
      <div class="messages-list">
        <div class="messages-list-header">Messages</div>
        ${conversations.map((c, i) => `
          <div class="message-item ${chatIdx === i ? 'active' : ''}" data-chat="${i}">
            <div class="message-ava" style="background:${c.user.avatar}">${c.user.initials}</div>
            <div class="message-info">
              <div class="message-name">${c.user.name} ${c.user.verified ? '✓' : ''}</div>
              <div class="message-preview">${c.lastMsg}</div>
            </div>
            <div class="message-meta">
              <div class="message-time">${c.time}</div>
              ${c.unread ? '<div class="message-unread"></div>' : ''}
            </div>
          </div>
        `).join('')}
      </div>
      <div class="chat-area">
        <div class="chat-header">
          <div class="message-ava" style="background:${chat.user.avatar};width:36px;height:36px;font-size:14px;">${chat.user.initials}</div>
          <div>
            <div class="chat-header-name">${chat.user.name}</div>
            <div style="font-size:12px;color:var(--text-muted);">${chat.user.isLive ? '\u{1F534} Live now' : 'Last active recently'}</div>

        </div>
        <div class="chat-messages">
          ${chat.messages.map(m => `

          <button class="chat-send-btn" id="chatSendBtn">➤</button>
        </div>

  `;
}

// ========== AUCTION DETAIL MODAL ==========
function renderAuctionDetail(auctionId) {
  const a = auctions.find(x => x.id === auctionId);
  if (!a) return '';
  const nextBid = a.price + Math.max(Math.ceil(a.price * 0.02 / 50) * 50, 1);
  return `
    <div class="modal-overlay active" id="detailOverlay">
      <div class="detail-modal">
        <div class="detail-grid">
          <div class="detail-images">
            <div class="detail-main-img" style="background:linear-gradient(135deg, ${a.creator.avatar}15, ${a.creator.avatar}30);">${a.imageUrl ? '<img src="' + a.imageUrl + '" style="width:100%;height:100%;object-fit:contain;">' : a.image}</div>
            <div class="detail-thumbs">
              <div class="detail-thumb active" style="background:linear-gradient(135deg, ${a.creator.avatar}15, ${a.creator.avatar}30);">${a.imageUrl ? '<img src="' + a.imageUrl + '" style="width:100%;height:100%;object-fit:cover;border-radius:6px;">' : a.image}</div>
              ${(a.allImages || []).slice(1, 3).map(img => `
                <div class="detail-thumb" style="background:var(--bg-hover);"><img src="${img}" style="width:100%;height:100%;object-fit:cover;border-radius:6px;"></div>
              `).join('')}
            </div>
          </div>
          <div class="detail-content">
            <button class="detail-close" onclick="closeDetail()">✕</button>
            <div class="detail-creator-row">
              <div class="detail-creator-ava" style="background:${a.creator.avatar}">${a.creator.initials}</div>
              <div>
                <div class="detail-creator-name">${a.creator.name} ${a.creator.verified ? '✓' : ''}</div>
                <div class="detail-creator-sub">${a.creator.followers} followers</div>
              </div>
            </div>
            <div class="detail-title">${a.title}</div>
            <div class="detail-description">${a.description}</div>
            <div class="detail-bid-section">
              <div class="detail-current-label">Current Bid</div>
              <div class="detail-current-price">${formatPrice(a.price)}</div>
              <div class="detail-bid-row">
                <input class="detail-bid-input" type="text" value="${formatPrice(nextBid)}" id="bidInput">
                <button class="detail-place-bid" onclick="placeBid('${a.id}')">Place Bid</button>
              </div>
            </div>
            <div class="detail-meta">
              <div class="detail-meta-item">⏱ ${a.timeLeft} left</div>
              <div class="detail-meta-item">\u{1F465} ${a.bids} bids</div>
              <div class="detail-meta-item">\u{1F441} ${a.viewers?.toLocaleString() || '0'} watching</div>
              <div class="detail-meta-item">\u{1F4B0} Started at ${formatPrice(a.startPrice)}</div>
            </div>
          </div>
        </div>
      </div>
    </div>
  `;
}

// ========== CREATE AUCTION MODAL ==========
function renderCreateAuction() {
  var s = state.createStep;
  var h = '<div class="create-overlay active" onclick="if(event.target===this)closeCreateAuction()">';
  h += '<div class="create-modal">';
  h += '<div class="create-header"><h2>'+(s===1?'Create Listing':s===2?'Set Pricing':'Review & Publish')+'</h2>';
  h += '<button class="create-close" onclick="closeCreateAuction()">&#10005;</button></div>';
  h += '<div class="create-body">';
  h += '<div class="create-steps">';
  h += '<div class="create-step '+(s>=1?(s>1?'done':'active'):'')+'"></div>';
  h += '<div class="create-step '+(s>=2?(s>2?'done':'active'):'')+'"></div>';
  h += '<div class="create-step '+(s>=3?'active':'')+'"></div>';
  h += '</div>';

  if (s === 1) {
    h += '<div class="create-section"><div class="create-section-title">Photos</div>';
    h += '<div class="create-upload" onclick="document.getElementById(\'auctionImages\').click()"><div class="create-upload-icon">&#128247;</div>';
    h += '<div class="create-upload-text">Click to browse photos</div>';
    h += '<div class="create-upload-hint">Up to 10 photos. JPG, PNG, or WEBP. Max 10MB each.</div>';
    h += '<input type="file" id="auctionImages" multiple accept="image/*" style="display:none" onchange="handleImageSelect(this)"></div>';
    h += '<div id="imagePreview" style="display:flex;gap:8px;flex-wrap:wrap;margin-top:8px;"></div></div>';

  else h += '<button class="create-submit-btn" onclick="publishAuction()">&#127881; Publish Listing</button>';

async function handleAvatarUpload(input) {
  if (!input.files.length || !state.user) return;
  const file = input.files[0];
  try {
    const ext = file.name.split('.').pop();
    const path = 'avatars/' + state.user.id + '.' + ext;
    const { error } = await sb.storage.from('avatars').upload(path, file, { upsert: true });
    if (error) throw error;
    const { data: urlData } = sb.storage.from('avatars').getPublicUrl(path);
    await sb.from('profiles').update({ avatar_url: urlData.publicUrl }).eq('id', state.user.id);
    state.user.avatar_url = urlData.publicUrl;
    showToast('Avatar updated!', 'success');
    render();
  } catch(e) { showToast('Avatar upload failed: ' + e.message, 'error'); }
}

async function saveProfile() {
  if (!state.user) return;
  const name = $('#spDisplayName')?.value?.trim();
  const username = $('#spUsername')?.value?.trim();
  const bio = $('#spBio')?.value?.trim();
  const location = $('#spLocation')?.value?.trim();
  const website = $('#spWebsite')?.value?.trim();
  try {
    const { error } = await sb.from('profiles').upsert({
      id: state.user.id,
      display_name: name,
      username: username,
      bio: bio,
      location: location,
      website: website
    });
    if (error) throw error;
    state.user.name = name; state.user.username = username;
    state.user.bio = bio; state.user.location = location;
    state.user.website = website;
    state.user.initials = (name || 'C').substring(0,2).toUpperCase();
    showToast('Profile saved!', 'success');
    closeSettingsPanel();
  } catch(e) { showToast('Save failed: ' + e.message, 'error'); }
}

  if (pw !== confirm) { showToast('Passwords do not match', 'error'); return; }
  try {
    const { error } = await sb.auth.updateUser({ password: pw });
    if (error) throw error;
    showToast('Password updated!', 'success');
    closeSettingsPanel();
  } catch(e) { showToast('Password update failed: ' + e.message, 'error'); }

      user_id: state.user.id,

    } else {
      showToast('Application submitted! We\'ll review it shortly.', 'success');

    closeSettingsPanel();

    showToast('Application submitted! We\'ll review it shortly.', 'success');

async function placeBid(auctionId) {
  if (!state.user) return;
  const a = auctions.find(x => x.id === auctionId);
  if (!a) return;

  const bidInput = $('#bidInput');
  let bidAmount = a.price + Math.max(Math.ceil(a.price * 0.02 / 50) * 50, 1);
  if (bidInput) {
    const parsed = parseInt(bidInput.value.replace(/[^0-9]/g, ''));
    if (parsed && parsed > a.price) bidAmount = parsed;
  }

  try {
    const { error } = await sb.from('bids').insert({
      auction_id: auctionId,
      bidder_id: state.user.id,
      amount_cents: bidAmount * 100,
      status: 'active'
    });
    if (error) throw error;

    showToast('Bid placed: ' + formatPrice(bidAmount) + '!', 'success');

    // Reload data
    await Promise.all([loadAuctions(), loadMyBids()]);
    render();
    if (state.showAuctionDetail) openDetail(auctionId);
  } catch(e) { showToast('Bid failed: ' + e.message, 'error'); }
}

async function publishAuction() {
  if (!state.user) return;

  // Get form values (they may have been collected across steps - use stored values)
  const title = window._createTitle || '';
  const desc = window._createDesc || '';
  const category = window._createCategory || '';
  const price = window._createPrice || 0;
  const duration = window._createDuration || 12;

  if (!title || !category || !price) {
    showToast('Please fill in all required fields', 'error');
    return;
  }

  try {
    // Upload images
    let imageUrls = [];
    for (const file of selectedImages) {
      const ext = file.name.split('.').pop();
      const path = state.user.id + '/' + Date.now() + '_' + Math.random().toString(36).substring(2) + '.' + ext;
      const { error: uploadErr } = await sb.storage.from('auction-images').upload(path, file);
      if (!uploadErr) {
        const { data: urlData } = sb.storage.from('auction-images').getPublicUrl(path);
        if (urlData) imageUrls.push(urlData.publicUrl);
      }
    }

    const endsAt = new Date(Date.now() + duration * 3600000).toISOString();

    const { error } = await sb.from('auctions').insert({
      creator_id: state.user.id,
      title: title,
      description: desc,
      category: category,
      starting_price_cents: Math.round(price * 100),
      ends_at: endsAt,
      images: imageUrls,
      status: 'active'
    });
    if (error) throw error;

    state.showCreateAuction = false;
    selectedImages = [];
    window._createTitle = '';
    window._createDesc = '';
    window._createCategory = '';
    window._createPrice = 0;
    window._createDuration = 12;

    showToast('Listing published! It is now live.', 'success');
    await loadAuctions();
    render();
  } catch(e) { showToast('Publish failed: ' + e.message, 'error'); }
}

async function startConversation(creatorId) {
  if (!state.user) return;
  try {
    // Check if conversation already exists
    const { data: existing } = await sb.from('conversations')
      .select('id')
      .or('and(participant_1.eq.' + state.user.id + ',participant_2.eq.' + creatorId + '),and(participant_1.eq.' + creatorId + ',participant_2.eq.' + state.user.id + ')')
      .single();

    if (existing) {
      // Switch to messages
      const idx = conversations.findIndex(c => c.rawId === existing.id);
      if (idx >= 0) state.selectedChat = idx;
      navigateTo('messages');
    } else {
      // Create new conversation
      const { data, error } = await sb.from('conversations').insert({
        participant_1: state.user.id,
        participant_2: creatorId
      }).select().single();
      if (error) throw error;
      await loadConversations();
      state.selectedChat = 0;
      navigateTo('messages');
    }
  } catch(e) { showToast('Could not start conversation: ' + e.message, 'error'); }
}

async function loadLiveChat(auctionId) {

      .eq('auction_id', auctionId)

function updateLiveChatUI() {
  const area = $('#liveChatArea');
  if (!area) return;
  if (liveChatMessages.length === 0) {
    area.innerHTML = '<div style="padding:20px;text-align:center;color:var(--text-muted);font-size:13px;">No messages yet. Be the first to say something!</div>';
    return;
  }
  area.innerHTML = liveChatMessages.map(m => `
    <div class="live-chat-msg">
      <div class="live-chat-ava" style="background:${m.ava}">${m.user[0].toUpperCase()}</div>
      <div class="live-chat-body">
        <div class="live-chat-name">${m.user}</div>
        <div class="live-chat-text">${m.text}</div>
      </div>

async function sendLiveChat(auctionId, text) {
  if (!state.user || !text.trim()) return;
  try {
    const { error } = await sb.from('auction_chat').insert({
      auction_id: auctionId,
      user_id: state.user.id,
      content: text.trim()
    });

}

// ========== BIND APP EVENTS ==========
function bindAppEvents() {
  // Category pills
  $$('.cat-pill, .nav-cat-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      const cat = btn.dataset.cat;
      if (cat) {
        state.selectedCategory = cat;
        state.currentPage = 'discover';
        render();
      }
    });
  });

  // Search
  const searchInput = $('#searchInput');
  if (searchInput) {
    searchInput.addEventListener('input', (e) => {
      state.searchQuery = e.target.value;
      if (state.currentPage === 'discover') {
        const discoverPage = $('#page-discover');
        if (discoverPage) discoverPage.innerHTML = renderDiscover();
        $$('.cat-pill').forEach(btn => {
          btn.addEventListener('click', () => {
            state.selectedCategory = btn.dataset.cat;
            render();
          });
        });
      }
    });
  }

  // Follow buttons
  $$('.creator-follow-btn').forEach(btn => {
    btn.addEventListener('click', (e) => {
      e.stopPropagation();
      const id = btn.dataset.creator;
      toggleFollow(id);
    });
  });

  // Bid tabs
  $$('[data-bid-tab]').forEach(tab => {
    tab.addEventListener('click', () => {
      state.bidTab = tab.dataset.bidTab;
      render();
    });
  });

  // Chat selection
  $$('[data-chat]').forEach(item => {
    item.addEventListener('click', () => {
      state.selectedChat = parseInt(item.dataset.chat);
      render();
    });
  });

  // Chat send (DM)
  const chatSend = $('#chatSendBtn');
  const chatInput = $('#chatMsgInput');
  if (chatSend && chatInput) {
    const sendMsg = async () => {
      const text = chatInput.value.trim();
      if (!text || !state.user) return;
      const conv = conversations[state.selectedChat];
      if (!conv) return;

      try {
        const { error } = await sb.from('messages').insert({
          conversation_id: conv.rawId,
          sender_id: state.user.id,
          content: text
        });
        if (error) throw error;

        // Update conversation last_message_at
        await sb.from('conversations').update({ last_message_at: new Date().toISOString() }).eq('id', conv.rawId);

        // Optimistic update
        conv.messages.push({ from: 'me', text });
        conv.lastMsg = text;
        conv.time = 'now';
        chatInput.value = '';
        render();
        const chatArea = $('.chat-messages');
        if (chatArea) chatArea.scrollTop = chatArea.scrollHeight;
      } catch(e) { showToast('Failed to send message', 'error'); }
    };
    chatSend.addEventListener('click', sendMsg);
    chatInput.addEventListener('keydown', (e) => { if (e.key === 'Enter') sendMsg(); });
  }

  // Live chat send
  const liveSend = $('#liveChatSend');
  const liveInput = $('#liveChatInput');
  if (liveSend && liveInput && state.showLive) {
    const sendLive = () => {
      const text = liveInput.value.trim();
      if (text) {
        sendLiveChat(state.showLive, text);
        liveInput.value = '';
      }
    };
    liveSend.addEventListener('click', sendLive);
    liveInput.addEventListener('keydown', (e) => { if (e.key === 'Enter') sendLive(); });
  }

  // Detail overlay close
  const overlay = $('#detailOverlay');
  if (overlay) {
    overlay.addEventListener('click', (e) => {
      if (e.target === overlay) closeDetail();
    });
  }

  // Keyboard shortcuts
  document.onkeydown = (e) => {
    if (e.key === 'Escape' && state.showLive !== null) closeLive();
    else if (e.key === 'Escape' && state.showAuctionDetail !== null) closeDetail();
    else if (e.key === 'Escape' && state.showCreateAuction) closeCreateAuction();
  };

  // Store create auction form values when navigating steps
  const titleInput = $('#createTitle');
  const descInput = $('#createDesc');
  const catInput = $('#createCategory');
  const priceInput = $('#createPrice');
  const durationInput = $('#createDuration');
  if (titleInput) titleInput.addEventListener('input', (e) => { window._createTitle = e.target.value; });
  if (descInput) descInput.addEventListener('input', (e) => { window._createDesc = e.target.value; });
  if (catInput) catInput.addEventListener('change', (e) => { window._createCategory = e.target.value; });
  if (priceInput) priceInput.addEventListener('input', (e) => { window._createPrice = parseFloat(e.target.value) || 0; });
  if (durationInput) durationInput.addEventListener('change', (e) => { window._createDuration = parseInt(e.target.value) || 12; });
}

// ========== REALTIME SUBSCRIPTIONS ==========
let realtimeChannel = null;

function setupRealtime() {
  if (realtimeChannel) realtimeChannel.unsubscribe();

  realtimeChannel = sb.channel('aucty-realtime')
    // New bids
    .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'bids' }, async (payload) => {
      const bid = payload.new;
      // If we were outbid, show notification
      if (state.user && bid.bidder_id !== state.user.id) {
        const a = auctions.find(x => x.id === bid.auction_id);
        if (a && state.watchlist.has(bid.auction_id)) {
          showToast('New bid on ' + a.title + ': ' + formatPrice(Math.round(bid.amount_cents / 100)), 'info');
        }
      }
      // Reload auction data
      await loadAuctions();
      if (state.user) await loadMyBids();
      render();
      if (state.showAuctionDetail) openDetail(state.showAuctionDetail);
      if (state.showLive) openLive(state.showLive);
    })
    // Auction updates
    .on('postgres_changes', { event: 'UPDATE', schema: 'public', table: 'auctions' }, async () => {
      await loadAuctions();
      render();
    })
    // New messages
    .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'messages' }, async (payload) => {
      const msg = payload.new;
      if (state.user && msg.sender_id !== state.user.id) {
        showToast('New message received!', 'info');
        await loadConversations();
        render();
      }
    })
    // Live chat
    .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'auction_chat' }, async (payload) => {
      const msg = payload.new;
      if (state.showLive === msg.auction_id) {
        // Fetch sender profile
        const { data: profile } = await sb.from('profiles').select('display_name, username').eq('id', msg.user_id).single();
        liveChatMessages.push({
          user: profile?.display_name || profile?.username || 'User',
          ava: avatarColor(msg.user_id),
          text: msg.content
        });
        updateLiveChatUI();
      }
    })
    // Notifications
    .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'notifications' }, async (payload) => {
      if (state.user && payload.new.user_id === state.user.id) {
        unreadNotifCount++;
        showToast(payload.new.title || 'New notification', 'info');
        render();
      }
    })
    .subscribe();
}

// ========== COUNTDOWN TIMER ==========
setInterval(() => {
  // Refresh timeLeft for all auctions
  auctions.forEach(a => {
    if (a.endsAt) {
      a.timeLeft = computeTimeLeft(a.endsAt);
      a.badge = computeBadge(a.raw || {});
    }
  });
  // Only re-render if on discover page to avoid interrupting other interactions
  if (state.currentPage === 'discover' && !state.showAuctionDetail && !state.showLive && !state.showCreateAuction) {
    const discoverPage = $('#page-discover');
    if (discoverPage) discoverPage.innerHTML = renderDiscover();
    // Rebind category pills
    $$('.cat-pill').forEach(btn => {
      btn.addEventListener('click', () => {
        state.selectedCategory = btn.dataset.cat;
        render();
      });
    });
  }
}, 60000); // Every 60 seconds

// ========== INIT ==========
(async function init() {
  // Check URL params for auth mode
  const params = new URLSearchParams(window.location.search);
  if (params.get('mode') === 'signup') state.authMode = 'signup';
  if (params.get('mode') === 'signin') state.authMode = 'signin';

  // Apply dark mode from localStorage
  if (state.darkMode) document.body.classList.add('dark-mode');

  // Check for existing session
  const { data: { session } } = await sb.auth.getSession();
  if (session) {
    state.isAuthenticated = true;
    state.user = {
      id: session.user.id,
      name: session.user.user_metadata?.display_name || session.user.email?.split('@')[0] || 'Collector',
      username: session.user.user_metadata?.username || session.user.email?.split('@')[0] || 'collector',
      email: session.user.email,
      initials: getInitials(session.user.user_metadata?.display_name || session.user.email?.split('@')[0] || 'C')
    };

    render(); // Show app shell immediately

    // Load data in background
    await loadProfile();
    await loadAllData();
    setupRealtime();
    render(); // Re-render with real data
  } else {
    render(); // Show auth screen
  }

  // Listen for auth state changes (handles OAuth redirects, etc.)
  sb.auth.onAuthStateChange(async (event, session) => {
    if (event === 'SIGNED_IN' && session) {
      state.isAuthenticated = true;
      state.user = {
        id: session.user.id,
        name: session.user.user_metadata?.display_name || session.user.email?.split('@')[0] || 'Collector',
        username: session.user.user_metadata?.username || session.user.email?.split('@')[0] || 'collector',
        email: session.user.email,
        initials: getInitials(session.user.user_metadata?.display_name || session.user.email?.split('@')[0] || 'C')
      };
      state.loading = false;
      render();

      await loadProfile();
      await loadAllData();
      setupRealtime();
      render();
    } else if (event === 'SIGNED_OUT') {
      state.isAuthenticated = false;
      state.user = null;
      state.loading = false;
      if (realtimeChannel) realtimeChannel.unsubscribe();
      render();
    }
  });
})();

</script>

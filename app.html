<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Aucty — Creator Auction Platform</title>
<meta name="description" content="Live creator auction platform — bid, message, and follow your favorite creators." />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
/* ========== RESET & BASE ========== */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body {
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  background: #fafafa;
  color: #0a0a0f;
  -webkit-font-smoothing: antialiased;
  line-height: 1.5;
  overflow-x: hidden;
}
body.dark-mode { background: #0a0a0f; color: #fafafa; }
a { color: inherit; text-decoration: none; }
button { font: inherit; cursor: pointer; border: none; background: none; }
img { max-width: 100%; display: block; }
input, select, textarea { font: inherit; }

/* ========== CSS VARIABLES ========== */
:root {
  --brand: #7c3aed;
  --brand-light: #a78bfa;
  --brand-dark: #5b21b6;
  --cyan: #06b6d4;
  --pink: #ff3d8a;
  --orange: #ff8a3d;
  --green: #10b981;
  --red: #ef4444;
  --yellow: #fbbf24;
  --bg: #fafafa;
  --bg-card: #ffffff;
  --bg-hover: #f3f4f6;
  --bg-input: #ffffff;
  --text: #0a0a0f;
  --text-secondary: #6b7280;
  --text-muted: #9ca3af;
  --border: #e5e7eb;
  --border-hover: #d1d5db;
  --shadow-sm: 0 1px 3px rgba(0,0,0,0.06);
  --shadow-md: 0 4px 16px rgba(0,0,0,0.08);
  --shadow-lg: 0 12px 40px rgba(0,0,0,0.12);
  --radius-sm: 8px;
  --radius-md: 12px;
  --radius-lg: 16px;
  --radius-xl: 24px;
  --radius-full: 999px;
  --gradient: linear-gradient(135deg, #7c3aed, #ec4899);
  --gradient-vibrant: linear-gradient(135deg, #ff3d8a 0%, #7c3aed 50%, #18e6c5 100%);
}
body.dark-mode {
  --bg: #0a0a0f;
  --bg-card: #141420;
  --bg-hover: #1e1e2e;
  --bg-input: #1a1a28;
  --text: #fafafa;
  --text-secondary: #9ca3af;
  --text-muted: #6b7280;
  --border: #2a2a3a;
  --border-hover: #3a3a4a;
  --shadow-sm: 0 1px 3px rgba(0,0,0,0.3);
  --shadow-md: 0 4px 16px rgba(0,0,0,0.4);
  --shadow-lg: 0 12px 40px rgba(0,0,0,0.5);
}

/* ========== AUTH OVERLAY ========== */
.auth-overlay {
  position: fixed; inset: 0; z-index: 1000;
  background: rgba(10,10,15,0.6);
  backdrop-filter: blur(12px);
  display: flex; align-items: center; justify-content: center;
  opacity: 0; pointer-events: none;
  transition: opacity 0.3s ease;
}
.auth-overlay.active { opacity: 1; pointer-events: all; }
.auth-card {
  background: var(--bg-card);
  border-radius: var(--radius-xl);
  padding: 40px;
  width: 440px;
  max-width: 95vw;
  box-shadow: var(--shadow-lg);
  border: 1px solid var(--border);
  position: relative;
  transform: translateY(20px);
  transition: transform 0.3s ease;
}
.auth-overlay.active .auth-card { transform: translateY(0); }
.auth-logo {
  font-family: 'Space Grotesk', sans-serif;
  font-size: 32px; font-weight: 800;
  text-align: center;
  margin-bottom: 8px;
}
.auth-logo span { background: var(--gradient); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; }
.auth-subtitle { text-align: center; color: var(--text-secondary); font-size: 15px; margin-bottom: 28px; }
.auth-tabs {
  display: flex; gap: 4px; padding: 4px;
  background: var(--bg-hover);
  border-radius: var(--radius-md);
  margin-bottom: 24px;
}
.auth-tab {
  flex: 1; padding: 10px; border-radius: var(--radius-sm);
  font-weight: 600; font-size: 14px; text-align: center;
  color: var(--text-secondary);
  transition: all 0.2s ease;
}
.auth-tab.active {
  background: var(--bg-card); color: var(--text);
  box-shadow: var(--shadow-sm);
}
.auth-input-group { margin-bottom: 16px; }
.auth-label {
  display: block; font-size: 13px; font-weight: 600;
  color: var(--text-secondary); margin-bottom: 6px;
  text-transform: uppercase; letter-spacing: 0.05em;
}
.auth-input {
  width: 100%; padding: 12px 14px;
  border: 1.5px solid var(--border);
  border-radius: var(--radius-sm);
  background: var(--bg-input);
  color: var(--text);
  font-size: 15px;
  transition: border-color 0.2s ease, box-shadow 0.2s ease;
  outline: none;
}
.auth-input:focus {
  border-color: var(--brand);
  box-shadow: 0 0 0 3px rgba(124,58,237,0.15);
}
.auth-btn {
  width: 100%; padding: 14px;
  border-radius: var(--radius-full);
  font-weight: 700; font-size: 15px;
  color: #fff;
  background: var(--gradient);
  border: none;
  cursor: pointer;
  margin-top: 8px;
  transition: transform 0.15s ease, box-shadow 0.15s ease;
}
.auth-btn:hover { transform: translateY(-1px); box-shadow: 0 8px 24px rgba(124,58,237,0.3); }
.auth-divider {
  display: flex; align-items: center; gap: 12px;
  color: var(--text-muted); font-size: 12px;
  margin: 20px 0;
}
.auth-divider::before, .auth-divider::after { content: ''; flex: 1; height: 1px; background: var(--border); }
.auth-social {
  display: flex; gap: 10px;
}
.auth-social-btn {
  flex: 1; padding: 12px;
  border-radius: var(--radius-sm);
  border: 1.5px solid var(--border);
  background: var(--bg-card);
  font-size: 14px; font-weight: 600;
  display: flex; align-items: center; justify-content: center; gap: 8px;
  color: var(--text);
  transition: border-color 0.2s ease, background 0.2s ease;
}
.auth-social-btn:hover { border-color: var(--border-hover); background: var(--bg-hover); }
.auth-footer { text-align: center; margin-top: 20px; font-size: 13px; color: var(--text-muted); }
.auth-footer a { color: var(--brand); font-weight: 600; }

/* ========== TOP NAV ========== */
.top-nav {
  position: sticky; top: 0; z-index: 100;
  background: rgba(255,255,255,0.85);
  backdrop-filter: saturate(1.4) blur(16px);
  -webkit-backdrop-filter: saturate(1.4) blur(16px);
  border-bottom: 1px solid var(--border);
  height: 64px;
}
body.dark-mode .top-nav {
  background: rgba(10,10,15,0.88);
}
.nav-container {
  max-width: 1440px; margin: 0 auto;
  padding: 0 24px;
  display: flex; align-items: center; height: 100%;
  gap: 24px;
}
.nav-brand {
  font-family: 'Space Grotesk', sans-serif;
  font-size: 24px; font-weight: 800;
  letter-spacing: -0.03em;
  display: flex; align-items: center; gap: 10px;
  flex-shrink: 0;
}
.nav-brand-mark {
  width: 34px; height: 34px; border-radius: 10px;
  background: var(--gradient-vibrant);
  display: grid; place-items: center;
  color: #fff; font-weight: 900; font-size: 16px;
  box-shadow: 0 4px 12px rgba(255,61,138,0.3);
}
.nav-brand span {
  background: var(--gradient); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent;
}
.nav-search {
  flex: 1; max-width: 480px; position: relative;
}
.nav-search input {
  width: 100%; padding: 10px 14px 10px 40px;
  border: 1.5px solid var(--border);
  border-radius: var(--radius-full);
  background: var(--bg-card);
  color: var(--text);
  font-size: 14px;
  outline: none;
  transition: border-color 0.2s, box-shadow 0.2s;
}
.nav-search input:focus {
  border-color: var(--brand);
  box-shadow: 0 0 0 3px rgba(124,58,237,0.12);
}
.nav-search .search-icon {
  position: absolute; left: 14px; top: 50%; transform: translateY(-50%);
  color: var(--text-muted); font-size: 16px; pointer-events: none;
}
.nav-categories {
  display: flex; gap: 6px; flex-shrink: 0;
}
.nav-cat-btn {
  padding: 7px 14px;
  border-radius: var(--radius-full);
  font-size: 13px; font-weight: 600;
  color: var(--text-secondary);
  border: 1.5px solid transparent;
  transition: all 0.2s ease;
  white-space: nowrap;
}
.nav-cat-btn:hover { color: var(--text); background: var(--bg-hover); }
.nav-cat-btn.active {
  color: var(--brand);
  background: rgba(124,58,237,0.08);
  border-color: rgba(124,58,237,0.2);
}
.nav-actions {
  display: flex; align-items: center; gap: 8px; flex-shrink: 0; margin-left: auto;
}
.nav-icon-btn {
  width: 40px; height: 40px;
  border-radius: var(--radius-sm);
  display: grid; place-items: center;
  font-size: 20px;
  color: var(--text-secondary);
  position: relative;
  transition: background 0.2s, color 0.2s;
}
.nav-icon-btn:hover { background: var(--bg-hover); color: var(--text); }
.nav-icon-btn .badge {
  position: absolute; top: 4px; right: 4px;
  width: 18px; height: 18px;
  background: var(--red);
  color: #fff;
  font-size: 10px; font-weight: 800;
  border-radius: 50%;
  display: grid; place-items: center;
  border: 2px solid var(--bg);
}
.nav-avatar {
  width: 36px; height: 36px;
  border-radius: 50%;
  background: var(--gradient);
  display: grid; place-items: center;
  color: #fff; font-weight: 700; font-size: 14px;
  cursor: pointer;
  border: 2px solid transparent;
  transition: border-color 0.2s;
}
.nav-avatar:hover { border-color: var(--brand); }
.sell-btn {
  padding: 9px 18px;
  border-radius: var(--radius-full);
  font-weight: 700; font-size: 13px;
  color: #fff;
  background: var(--gradient);
  transition: transform 0.15s, box-shadow 0.15s;
}
.sell-btn:hover { transform: translateY(-1px); box-shadow: 0 6px 20px rgba(124,58,237,0.3); }

/* ========== SIDEBAR ========== */
.app-layout {
  display: flex;
  max-width: 1440px;
  margin: 0 auto;
  min-height: calc(100vh - 64px);
}
.sidebar {
  width: 220px;
  padding: 16px 12px;
  border-right: 1px solid var(--border);
  position: sticky; top: 64px;
  height: calc(100vh - 64px);
  overflow-y: auto;
  flex-shrink: 0;
  background: var(--bg);
}
.sidebar::-webkit-scrollbar { width: 3px; }
.sidebar::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
.sidebar-section { margin-bottom: 24px; }
.sidebar-title {
  font-size: 11px; font-weight: 700;
  text-transform: uppercase; letter-spacing: 0.1em;
  color: var(--text-muted); padding: 0 10px; margin-bottom: 6px;
}
.sidebar-item {
  display: flex; align-items: center; gap: 10px;
  padding: 9px 10px;
  border-radius: var(--radius-sm);
  font-size: 14px; font-weight: 500;
  color: var(--text-secondary);
  transition: all 0.15s ease;
  cursor: pointer;
}
.sidebar-item:hover { background: var(--bg-hover); color: var(--text); }
.sidebar-item.active {
  background: rgba(124,58,237,0.08);
  color: var(--brand); font-weight: 600;
}
.sidebar-item .icon { font-size: 18px; width: 24px; text-align: center; }
.sidebar-item .sidebar-badge {
  margin-left: auto;
  background: var(--red);
  color: #fff; font-size: 10px; font-weight: 800;
  padding: 2px 6px; border-radius: var(--radius-full);
}

.sidebar-creators { margin-top: 8px; }
.sidebar-creator {
  display: flex; align-items: center; gap: 10px;
  padding: 8px 10px;
  border-radius: var(--radius-sm);
  cursor: pointer;
  transition: background 0.15s;
}
.sidebar-creator:hover { background: var(--bg-hover); }
.sidebar-creator-ava {
  width: 30px; height: 30px; border-radius: 50%;
  display: grid; place-items: center;
  color: #fff; font-weight: 700; font-size: 11px;
  flex-shrink: 0;
  position: relative;
}
.sidebar-creator-ava .live-dot {
  position: absolute; bottom: -1px; right: -1px;
  width: 10px; height: 10px;
  background: var(--red);
  border-radius: 50%;
  border: 2px solid var(--bg);
  animation: pulse 2s infinite;
}
@keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
.sidebar-creator-name {
  font-size: 13px; font-weight: 600;
  color: var(--text);
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.sidebar-creator-tag {
  font-size: 11px; color: var(--text-muted);
}

/* ========== MAIN CONTENT ========== */
.main-content {
  flex: 1;
  padding: 24px;
  overflow-y: auto;
  min-width: 0;
}
.main-content > .page { display: none; }
.main-content > .page.active { display: block; }

/* ========== SECTION HEADERS ========== */
.section-header {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 16px;
}
.section-title {
  font-family: 'Space Grotesk', sans-serif;
  font-size: 22px; font-weight: 700;
  letter-spacing: -0.02em;
}
.section-see-all {
  font-size: 13px; font-weight: 600;
  color: var(--brand);
  display: flex; align-items: center; gap: 4px;
  transition: opacity 0.2s;
}
.section-see-all:hover { opacity: 0.7; }

/* ========== LIVE STREAMS BANNER ========== */
.live-banner {
  background: linear-gradient(135deg, #1a0533, #0a0514);
  border-radius: var(--radius-xl);
  padding: 32px;
  margin-bottom: 28px;
  position: relative;
  overflow: hidden;
  color: #fff;
}
.live-banner::before {
  content: ''; position: absolute; inset: 0;
  background: radial-gradient(circle at 20% 30%, rgba(255,61,138,0.2), transparent 50%),
              radial-gradient(circle at 80% 60%, rgba(124,58,237,0.25), transparent 50%);
  pointer-events: none;
}
.live-banner-content { position: relative; z-index: 1; }
.live-banner .live-tag {
  display: inline-flex; align-items: center; gap: 6px;
  background: var(--red); color: #fff;
  padding: 5px 12px; border-radius: var(--radius-full);
  font-size: 12px; font-weight: 800;
  letter-spacing: 0.06em;
  margin-bottom: 12px;
}
.live-tag .dot { width: 6px; height: 6px; background: #fff; border-radius: 50%; animation: pulse 1.5s infinite; }
.live-banner h2 {
  font-family: 'Space Grotesk', sans-serif;
  font-size: 28px; font-weight: 800;
  letter-spacing: -0.02em;
  margin-bottom: 8px;
}
.live-banner p { color: rgba(255,255,255,0.7); font-size: 15px; max-width: 480px; }
.live-streams-row {
  display: flex; gap: 16px; margin-top: 20px;
  overflow-x: auto; padding-bottom: 4px;
  scrollbar-width: none;
}
.live-streams-row::-webkit-scrollbar { display: none; }

/* ========== STREAM CARDS ========== */
.stream-card {
  flex: 0 0 240px;
  border-radius: var(--radius-lg);
  overflow: hidden;
  cursor: pointer;
  transition: transform 0.2s ease;
  position: relative;
}
.stream-card:hover { transform: translateY(-4px); }
.stream-thumb {
  height: 320px;
  position: relative;
  overflow: hidden;
}
.stream-thumb-bg {
  width: 100%; height: 100%;
  object-fit: cover;
}
.stream-thumb-gradient {
  position: absolute; inset: 0;
  background: linear-gradient(180deg, transparent 40%, rgba(0,0,0,0.85) 100%);
}
.stream-live-badge {
  position: absolute; top: 10px; left: 10px;
  display: flex; align-items: center; gap: 5px;
  background: var(--red); color: #fff;
  padding: 3px 8px; border-radius: var(--radius-full);
  font-size: 11px; font-weight: 800;
}
.stream-live-badge .dot { width: 5px; height: 5px; background: #fff; border-radius: 50%; animation: pulse 1.5s infinite; }
.stream-viewers {
  position: absolute; top: 10px; right: 10px;
  background: rgba(0,0,0,0.55); color: #fff;
  padding: 3px 8px; border-radius: var(--radius-full);
  font-size: 11px; font-weight: 600;
  backdrop-filter: blur(6px);
}
.stream-info {
  position: absolute; bottom: 0; left: 0; right: 0;
  padding: 14px;
  color: #fff;
}
.stream-creator {
  display: flex; align-items: center; gap: 8px;
  margin-bottom: 6px;
}
.stream-creator-ava {
  width: 28px; height: 28px; border-radius: 50%;
  border: 2px solid #fff;
  display: grid; place-items: center;
  font-size: 11px; font-weight: 700;
}
.stream-creator-name { font-size: 13px; font-weight: 700; }
.stream-creator-verified { color: var(--cyan); font-size: 12px; }
.stream-title { font-size: 14px; font-weight: 600; line-height: 1.3; }
.stream-category {
  display: inline-block;
  background: rgba(255,255,255,0.15);
  padding: 2px 8px; border-radius: var(--radius-full);
  font-size: 11px; font-weight: 600;
  margin-top: 6px;
  backdrop-filter: blur(4px);
}

/* ========== AUCTION GRID ========== */
.auction-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
  gap: 16px;
  margin-bottom: 32px;
}
.auction-card {
  background: var(--bg-card);
  border-radius: var(--radius-lg);
  border: 1px solid var(--border);
  overflow: hidden;
  cursor: pointer;
  transition: transform 0.2s, box-shadow 0.2s, border-color 0.2s;
}
.auction-card:hover {
  transform: translateY(-4px);
  box-shadow: var(--shadow-md);
  border-color: var(--border-hover);
}
.auction-img {
  height: 200px;
  position: relative;
  overflow: hidden;
}
.auction-img-bg {
  width: 100%; height: 100%; object-fit: cover;
}
.auction-img-placeholder {
  width: 100%; height: 100%;
  display: grid; place-items: center;
  font-size: 48px;
}
.auction-badges {
  position: absolute; top: 10px; left: 10px;
  display: flex; gap: 6px;
}
.auction-badge {
  padding: 3px 8px; border-radius: var(--radius-full);
  font-size: 10px; font-weight: 800;
  letter-spacing: 0.04em; text-transform: uppercase;
}
.badge-live { background: var(--red); color: #fff; }
.badge-hot { background: var(--orange); color: #fff; }
.badge-ending { background: var(--yellow); color: #0a0514; }
.badge-new { background: var(--cyan); color: #fff; }
.auction-heart {
  position: absolute; top: 10px; right: 10px;
  width: 32px; height: 32px;
  background: rgba(255,255,255,0.9);
  border-radius: 50%;
  display: grid; place-items: center;
  font-size: 16px;
  transition: transform 0.15s;
  backdrop-filter: blur(6px);
}
body.dark-mode .auction-heart { background: rgba(0,0,0,0.5); }
.auction-heart:hover { transform: scale(1.15); }
.auction-heart.liked { color: var(--red); }
.auction-body { padding: 14px; }
.auction-creator-row {
  display: flex; align-items: center; gap: 8px;
  margin-bottom: 8px;
}
.auction-creator-ava {
  width: 24px; height: 24px; border-radius: 50%;
  display: grid; place-items: center;
  color: #fff; font-weight: 700; font-size: 10px;
}
.auction-creator-name {
  font-size: 12px; font-weight: 600;
  color: var(--text-secondary);
}
.auction-title {
  font-size: 15px; font-weight: 700;
  color: var(--text);
  margin-bottom: 8px;
  line-height: 1.3;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
}
.auction-price-row {
  display: flex; align-items: flex-end; justify-content: space-between;
}
.auction-price-label {
  font-size: 11px; color: var(--text-muted);
  text-transform: uppercase; letter-spacing: 0.06em; font-weight: 600;
}
.auction-price {
  font-family: 'Space Grotesk', sans-serif;
  font-size: 20px; font-weight: 800;
  color: var(--text);
  letter-spacing: -0.02em;
}
.auction-timer {
  font-size: 12px; font-weight: 700;
  color: var(--cyan);
  background: rgba(6,182,212,0.1);
  padding: 4px 10px;
  border-radius: var(--radius-sm);
}
.auction-bids {
  font-size: 12px; color: var(--text-muted);
  margin-top: 8px;
}
.auction-bid-btn {
  width: 100%; margin-top: 10px;
  padding: 10px;
  border-radius: var(--radius-sm);
  background: var(--gradient);
  color: #fff;
  font-weight: 700; font-size: 13px;
  text-align: center;
  transition: transform 0.15s, box-shadow 0.15s;
}
.auction-bid-btn:hover { transform: translateY(-1px); box-shadow: 0 4px 12px rgba(124,58,237,0.3); }

/* ========== CATEGORY PILLS ========== */
.category-pills {
  display: flex; gap: 8px; margin-bottom: 24px;
  overflow-x: auto; padding-bottom: 4px;
  scrollbar-width: none;
}
.category-pills::-webkit-scrollbar { display: none; }
.cat-pill {
  padding: 8px 18px;
  border-radius: var(--radius-full);
  border: 1.5px solid var(--border);
  background: var(--bg-card);
  font-size: 13px; font-weight: 600;
  color: var(--text-secondary);
  white-space: nowrap;
  transition: all 0.2s;
  cursor: pointer;
}
.cat-pill:hover { border-color: var(--border-hover); color: var(--text); }
.cat-pill.active {
  background: var(--brand);
  border-color: var(--brand);
  color: #fff;
}

/* ========== MESSAGES PAGE ========== */

}

}

}

}

}

}
.chat-bubble {

}

}

  border-bottom-left-radius: 4px;
}
.chat-input-row {
  padding: 12px 16px;
  border-top: 1px solid var(--border);
  display: flex; gap: 10px;
}
.chat-input {
  flex: 1; padding: 10px 14px;
  border: 1.5px solid var(--border);
  border-radius: var(--radius-full);
  background: var(--bg);
  color: var(--text);

}

/* ========== PROFILE PAGE ========== */
.profile-header {
  position: relative;
  margin-bottom: 24px;
}
.profile-banner {
  height: 200px;
  border-radius: var(--radius-xl);
  overflow: hidden;
  position: relative;
}

  width: 100%; height: 100%;
}
.profile-info {
  display: flex; align-items: flex-start; gap: 20px;
  margin-top: -48px;
  padding: 0 24px;
  position: relative; z-index: 1;
}
.profile-ava {
  width: 96px; height: 96px;
  border-radius: 50%;
  border: 4px solid var(--bg-card);
  display: grid; place-items: center;
  color: #fff; font-weight: 800; font-size: 32px;
  flex-shrink: 0;
}
.profile-name-section { flex: 1; padding-top: 56px; }

}

}

  margin-top: 12px;
}

  padding: 9px 20px;
  border-radius: var(--radius-full);
  border: 1.5px solid var(--border);
  font-weight: 600; font-size: 13px;
  color: var(--text);
  background: var(--bg-card);
  transition: all 0.2s;
}
.profile-edit-btn:hover { border-color: var(--brand); color: var(--brand); }

/* ========== SETTINGS ========== */
.settings-list { max-width: 600px; }
.settings-group {
  margin-bottom: 24px;
}
.settings-group-title {
  font-size: 13px; font-weight: 700;
  text-transform: uppercase; letter-spacing: 0.06em;
  color: var(--text-muted); margin-bottom: 10px;
}
.settings-item {
  display: flex; align-items: center; justify-content: space-between;
  padding: 14px;
  border-radius: var(--radius-md);
  border: 1px solid var(--border);
  margin-bottom: 8px;
  cursor: pointer;
  transition: background 0.15s;
}
.settings-item:hover { background: var(--bg-hover); }
.settings-item-left {
  display: flex; align-items: center; gap: 12px;
}
.settings-item-icon {
  width: 36px; height: 36px;
  border-radius: var(--radius-sm);
  background: var(--bg-hover);
  display: grid; place-items: center;
  font-size: 18px;
}
.settings-item-label { font-size: 14px; font-weight: 600; }
.settings-item-desc { font-size: 12px; color: var(--text-muted); }
.settings-arrow { color: var(--text-muted); font-size: 18px; }

/* Toggle switch */
.toggle {
  position: relative;
  width: 44px; height: 24px;
  background: var(--border);
  border-radius: 12px;
  cursor: pointer;
  transition: background 0.2s;
}
.toggle.active { background: var(--brand); }
.toggle::after {
  content: '';
  position: absolute;
  top: 3px; left: 3px;
  width: 18px; height: 18px;
  background: #fff;
  border-radius: 50%;
  transition: transform 0.2s;
}
.toggle.active::after { transform: translateX(20px); }

/* ========== EMPTY STATE ========== */
.empty-state {
  text-align: center; padding: 60px 20px;
}
.empty-state .icon { font-size: 48px; margin-bottom: 16px; }
.empty-state h3 { font-size: 18px; font-weight: 700; margin-bottom: 8px; }
.empty-state p { font-size: 14px; color: var(--text-muted); max-width: 360px; margin: 0 auto; }

/* ========== TOAST ========== */
.toast {
  position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(100px);
  padding: 14px 24px;
  border-radius: var(--radius-md);
  font-size: 14px; font-weight: 600;
  z-index: 2000;
  transition: transform 0.3s ease;
  box-shadow: var(--shadow-lg);
}
.toast.show { transform: translateX(-50%) translateY(0); }
.toast.success { background: var(--green); color: #fff; }
.toast.error { background: var(--red); color: #fff; }
.toast.info { background: var(--brand); color: #fff; }

/* ========== RESPONSIVE ========== */
@media (max-width: 1024px) {
  .sidebar { display: none; }
  .detail-grid { grid-template-columns: 1fr; }
  .messages-layout { grid-template-columns: 1fr; }
}
@media (max-width: 768px) {
  .nav-categories { display: none; }
  .nav-search { max-width: 240px; }
  .auction-grid { grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); }
}

/* ========== LIVE STREAMS AUTOSCROLL ========== */
@keyframes autoscroll {
  0% { transform: translateX(0); }
  100% { transform: translateX(-50%); }
}
.live-streams-row.autoscroll {
  animation: autoscroll 60s linear infinite;
  width: max-content;
}
.live-streams-row.autoscroll:hover {
  animation-play-state: paused;
}

// ========== UTILITY ==========
function $(sel) { return document.querySelector(sel); }
function $$(sel) { return document.querySelectorAll(sel); }

function formatPrice(cents) {
  return '$' + cents.toLocaleString();
}

function showToast(msg, type = 'info') {
  let t = document.createElement('div');
  t.className = 'toast ' + type;
  t.textContent = msg;
  document.body.appendChild(t);
  requestAnimationFrame(() => t.classList.add('show'));
  setTimeout(() => { t.classList.remove('show'); setTimeout(() => t.remove(), 300); }, 2500);
}

// ========== RENDER ==========
function render() {
  const app = document.getElementById('app');
  if (!state.isAuthenticated) {
    app.innerHTML = renderAuth();
    bindAuthEvents();
  } else {
    app.innerHTML = renderApp();
    bindAppEvents();
  }
}

// ========== AUTH SCREEN ==========
function renderAuth() {
  const isSignup = state.authMode === 'signup';
  return `
    <div class="auth-overlay active">
      <div class="auth-card">
        <div class="auth-logo"><span>Aucty</span></div>
        <div class="auth-subtitle">${isSignup ? 'Create your account and start collecting' : 'Welcome back, collector'}</div>
        <div class="auth-tabs">
          <button class="auth-tab ${!isSignup ? 'active' : ''}" data-tab="signin">Sign In</button>
          <button class="auth-tab ${isSignup ? 'active' : ''}" data-tab="signup">Sign Up</button>
        </div>
        ${isSignup ? `
          <div class="auth-input-group">
            <label class="auth-label">Full Name</label>
            <input class="auth-input" type="text" placeholder="Enter your full name" id="authName">
          </div>
          <div class="auth-input-group">
            <label class="auth-label">Username</label>
            <input class="auth-input" type="text" placeholder="Choose a username" id="authUsername">
          </div>
        ` : ''}
        <div class="auth-input-group">
          <label class="auth-label">Email</label>
          <input class="auth-input" type="email" placeholder="your@email.com" id="authEmail">
        </div>
        <div class="auth-input-group">
          <label class="auth-label">Password</label>
          <input class="auth-input" type="password" placeholder="${isSignup ? 'Create a password' : 'Enter your password'}" id="authPassword">
        </div>
        <button class="auth-btn" id="authSubmit">${isSignup ? 'Create Account' : 'Sign In'}</button>
        <div class="auth-divider">or continue with</div>
        <div class="auth-social">
          <button class="auth-social-btn">🔵 Google</button>
          <button class="auth-social-btn">🍎 Apple</button>
        </div>
        <div class="auth-footer">
          ${isSignup
            ? 'Already have an account? <a href="#" id="authSwitch">Sign in</a>'
            : 'Don\'t have an account? <a href="#" id="authSwitch">Sign up</a>'}
        </div>
      </div>
    </div>
  `;
}

function bindAuthEvents() {
  $$('.auth-tab').forEach(tab => {
    tab.addEventListener('click', () => {
      state.authMode = tab.dataset.tab === 'signup' ? 'signup' : 'signin';
      render();
    });
  });
  const sw = $('#authSwitch');
  if (sw) sw.addEventListener('click', e => {
    e.preventDefault();
    state.authMode = state.authMode === 'signin' ? 'signup' : 'signin';
    render();
  });
  $('#authSubmit').addEventListener('click', () => {
    const email = $('#authEmail')?.value;
    if (!email) { showToast('Please enter your email', 'error'); return; }
    state.isAuthenticated = true;
    state.user = {
      name: $('#authName')?.value || 'Collector',
      username: $('#authUsername')?.value || 'collector',
      email: email,
      initials: ($('#authName')?.value || 'C')[0].toUpperCase()
    };
    showToast('Welcome to Aucty!', 'success');
    render();
  });
  $$('.auth-social-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      state.isAuthenticated = true;
      state.user = { name: 'Collector', username: 'collector', email: 'user@aucty.app', initials: 'C' };
      showToast('Welcome to Aucty!', 'success');
      render();
    });
  });
}

// ========== MAIN APP ==========
function renderApp() {
  return `

    <div class="app-layout">
      ${renderSidebar()}

        <div class="page ${state.currentPage === 'discover' ? 'active' : ''}" id="page-discover">${renderDiscover()}</div>
        <div class="page ${state.currentPage === 'bids' ? 'active' : ''}" id="page-bids">${renderBids()}</div>
        <div class="page ${state.currentPage === 'messages' ? 'active' : ''}" id="page-messages">${renderMessages()}</div>
        <div class="page ${state.currentPage === 'profile' ? 'active' : ''}" id="page-profile">${renderProfile()}</div>
        <div class="page ${state.currentPage === 'settings' ? 'active' : ''}" id="page-settings">${renderSettings()}</div>
        <div class="page ${state.currentPage === 'watchlist' ? 'active' : ''}" id="page-watchlist">${renderWatchlist()}</div>
        <div class="page ${state.currentPage === 'creator' ? 'active' : ''}" id="page-creator">${state.viewCreatorId !== null ? renderCreatorProfile(state.viewCreatorId) : ''}</div>
      </div>
    </div>
    ${state.showAuctionDetail !== null ? renderAuctionDetail(state.showAuctionDetail) : ''}
    ${state.showLive !== null ? renderLive(state.showLive) : ''}
    ${state.showCreateAuction ? renderCreateAuction() : ''}
    <div class="toast" id="toast"></div>
  `;
}

function renderTopNav() {
  const navCats = categories.slice(0, 7);
  return `
    <nav class="top-nav">
      <div class="nav-container">
        <a href="#" class="nav-brand" onclick="navigateTo('discover'); return false;">
          <span class="nav-brand-mark">A</span>
          <span>Aucty</span>
        </a>
        <div class="nav-search">
          <span class="search-icon">🔍</span>
          <input type="text" placeholder="Search auctions, creators, collections..." value="${state.searchQuery}" id="searchInput">
        </div>
        <div class="nav-categories">
          ${navCats.map(c => `
            <button class="nav-cat-btn ${state.selectedCategory === c.id ? 'active' : ''}" data-cat="${c.id}">${c.icon} ${c.label}</button>
          `).join('')}
        </div>
        <div class="nav-actions">
          <button class="sell-btn" onclick="openCreateAuction()">+ Sell</button>
          <button class="nav-icon-btn" onclick="navigateTo('messages')" title="Messages">
            💬
            <span class="badge">2</span>
          </button>
          <button class="nav-icon-btn" onclick="showToast('Notifications coming soon!', 'info')" title="Notifications">
            🔔
            <span class="badge">5</span>
          </button>
          <button class="nav-icon-btn" onclick="toggleDarkMode()" title="Toggle theme" id="themeBtn">
            ${state.darkMode ? '☀️' : '🌙'}
          </button>
          <button class="nav-avatar" onclick="navigateTo('profile')" title="Profile">
            ${state.user?.initials || 'C'}
          </button>
        </div>
      </div>
    </nav>
  `;
}

function renderSidebar() {

function renderAuctionCard(a) {
  const isWatched = state.watchlist.has(a.id);
  return `
    <div class="auction-card" onclick="openDetail(${a.id})">
      <div class="auction-img">
        <div class="auction-img-placeholder" style="background:linear-gradient(135deg, ${a.creator.avatar}15, ${a.creator.avatar}30);">${a.image}</div>
        <div class="auction-badges">
          ${a.badge === 'live' ? '<span class="auction-badge badge-live">● LIVE</span>' : ''}
          ${a.badge === 'hot' ? '<span class="auction-badge badge-hot">🔥 HOT</span>' : ''}
          ${a.badge === 'ending' ? '<span class="auction-badge badge-ending">⏱ ENDING</span>' : ''}
          ${a.badge === 'new' ? '<span class="auction-badge badge-new">NEW</span>' : ''}
        </div>
        <button class="auction-heart ${isWatched ? 'liked' : ''}" onclick="event.stopPropagation(); toggleWatchlist(${a.id})">
          ${isWatched ? '❤️' : '🤍'}
        </button>
      </div>
      <div class="auction-body">
        <div class="auction-creator-row">
          <div class="auction-creator-ava" style="background:${a.creator.avatar}">${a.creator.initials}</div>
          <span class="auction-creator-name">${a.creator.name} ${a.creator.verified ? '✓' : ''}</span>
        </div>
        <div class="auction-title">${a.title}</div>
        <div class="auction-price-row">
          <div>
            <div class="auction-price-label">Current bid</div>
            <div class="auction-price">${formatPrice(a.price)}</div>
          </div>
          <div class="auction-timer">⏱ ${a.timeLeft}</div>
        </div>
        <div class="auction-bids">${a.bids} bids · ${a.viewers?.toLocaleString() || 0} watching</div>

      </div>
    </div>
  `;
}

function renderBids() {
  const tabs = ['active', 'won', 'lost'];
  const filtered = state.bidTab === 'active'

    ? myBids.filter(b => b.status === 'won')

  return `
    <div class="section-header">
      <h2 class="section-title">My Bids</h2>
    </div>
    <div class="bids-tabs">
      ${tabs.map(t => `<button class="bids-tab ${state.bidTab === t ? 'active' : ''}" data-bid-tab="${t}">${t.charAt(0).toUpperCase() + t.slice(1)}</button>`).join('')}

      <div class="empty-state">

function renderAuctionDetail(auctionId) {
  const a = auctions.find(x => x.id === auctionId);
  if (!a) return '';
  const nextBid = a.price + Math.ceil(a.price * 0.02 / 50) * 50;
  return `
    <div class="modal-overlay active" id="detailOverlay">
      <div class="detail-modal">
        <div class="detail-grid">
          <div class="detail-images">
            <div class="detail-main-img" style="background:linear-gradient(135deg, ${a.creator.avatar}15, ${a.creator.avatar}30);">${a.image}</div>
            <div class="detail-thumbs">
              <div class="detail-thumb active" style="background:linear-gradient(135deg, ${a.creator.avatar}15, ${a.creator.avatar}30);">${a.image}</div>
              <div class="detail-thumb" style="background:var(--bg-hover);">📐</div>
              <div class="detail-thumb" style="background:var(--bg-hover);">📏</div>
            </div>
          </div>
          <div class="detail-content">
            <button class="detail-close" onclick="closeDetail()">✕</button>
            <div class="detail-creator-row">
              <div class="detail-creator-ava" style="background:${a.creator.avatar}">${a.creator.initials}</div>
              <div>
                <div class="detail-creator-name">${a.creator.name} ${a.creator.verified ? '✓' : ''}</div>
                <div class="detail-creator-sub">${a.creator.followers} followers · ${a.creator.items} items</div>
              </div>
            </div>
            <div class="detail-title">${a.title}</div>
            <div class="detail-description">${a.description}</div>
            <div class="detail-bid-section">
              <div class="detail-current-label">Current Bid</div>
              <div class="detail-current-price">${formatPrice(a.price)}</div>
              <div class="detail-bid-row">
                <input class="detail-bid-input" type="text" value="${formatPrice(nextBid)}" id="bidInput">
                <button class="detail-place-bid" onclick="placeBid(${a.id})">Place Bid</button>
              </div>
            </div>
            <div class="detail-meta">
              <div class="detail-meta-item">⏱ ${a.timeLeft} left</div>
              <div class="detail-meta-item">👥 ${a.bids} bids</div>
              <div class="detail-meta-item">👁 ${a.viewers?.toLocaleString()} watching</div>
              <div class="detail-meta-item">💰 Started at ${formatPrice(a.startPrice)}</div>
            </div>
          </div>
        </div>
      </div>
    </div>
  `;
}

// ========== CREATE AUCTION MODAL ==========
function renderCreateAuction() {
  var s = state.createStep;
  var h = '<div class="create-overlay" onclick="if(event.target===this)closeCreateAuction()">';
  h += '<div class="create-modal">';
  h += '<div class="create-header"><h2>'+(s===1?'Create Listing':s===2?'Set Pricing':'Review & Publish')+'</h2>';
  h += '<button class="create-close" onclick="closeCreateAuction()">&#10005;</button></div>';
  h += '<div class="create-body">';
  h += '<div class="create-steps">';
  h += '<div class="create-step '+(s>=1?(s>1?'done':'active'):'')+'"></div>';
  h += '<div class="create-step '+(s>=2?(s>2?'done':'active'):'')+'"></div>';
  h += '<div class="create-step '+(s>=3?'active':'')+'"></div></div>';
  if (s === 1) {
    h += '<div class="create-section"><div class="create-section-title">Photos</div>';
    h += '<div class="create-upload"><div class="create-upload-icon">&#128247;</div>';
    h += '<div class="create-upload-text">Drag photos here or click to browse</div>';
    h += '<div class="create-upload-hint">Up to 10 photos. JPG, PNG, or WEBP. Max 10MB each.</div></div></div>';
    h += '<div class="create-section"><div class="create-label">Title</div>';
    h += '<input class="create-input" type="text" placeholder="e.g. Vintage Rolex Submariner 1978"></div>';
    h += '<div class="create-section"><div class="create-label">Description</div>';
    h += '<textarea class="create-textarea" placeholder="Describe your item: condition, provenance, dimensions..."></textarea></div>';
    h += '<div class="create-row"><div><div class="create-label">Category</div><select class="create-select">';
    h += '<option value="">Select category</option>';
    categories.slice(1).forEach(function(c) { h += '<option value="'+c.id+'">'+c.icon+' '+c.label+'</option>'; });
    h += '</select></div><div><div class="create-label">Condition</div>';
    h += '<select class="create-select"><option>New with tags</option><option>Like new</option><option>Very good</option><option>Good</option><option>Fair</option></select></div></div>';
    h += '<div class="create-section" style="margin-top:16px"><div class="create-label">Voice Note (optional)</div>';
    h += '<div style="display:flex;align-items:center;gap:12px;padding:14px;border:1.5px solid var(--border);border-radius:var(--radius-sm);background:var(--bg-input);">';
    h += '<button style="width:40px;height:40px;border-radius:50%;background:var(--gradient);color:#fff;display:grid;place-items:center;font-size:18px;border:none;cursor:pointer;flex-shrink:0;" onclick="showToast(\x27Recording...\x27,\x27info\x27)">&#127908;</button>';
    h += '<div style="flex:1"><div style="font-size:13px;color:var(--text-secondary)">Record a voice note about your item</div>';
    h += '<div style="font-size:11px;color:var(--text-muted);margin-top:2px">Up to 60 seconds. Helps buyers understand your item better.</div></div></div></div>';
  } else if (s === 2) {
    h += '<div class="create-section"><div class="create-label">Starting Price ($)</div>';
    h += '<input class="create-input" type="number" placeholder="100"></div>';
    h += '<div class="create-row"><div><div class="create-label">Reserve Price ($)</div>';
    h += '<input class="create-input" type="number" placeholder="Optional minimum"></div>';
    h += '<div><div class="create-label">Buy Now Price ($)</div>';
    h += '<input class="create-input" type="number" placeholder="Optional instant buy"></div></div>';
    h += '<div class="create-section"><div class="create-label">Auction Duration</div>';
    h += '<select class="create-select"><option>1 hour</option><option>3 hours</option><option>6 hours</option><option selected>12 hours</option><option>24 hours</option><option>3 days</option><option>7 days</option></select></div>';
    h += '<div class="create-row"><div><div class="create-label">Shipping</div>';
    h += '<select class="create-select"><option>Free shipping</option><option>Buyer pays</option><option>Local pickup</option></select></div>';
    h += '<div><div class="create-label">Ships from</div>';
    h += '<input class="create-input" type="text" placeholder="City, Country"></div></div>';
    h += '<div class="create-section" style="margin-top:16px"><label style="display:flex;align-items:center;gap:10px;cursor:pointer;font-size:14px"><input type="checkbox" style="accent-color:var(--brand);width:18px;height:18px"> Go live when auction starts</label></div>';
  } else {
    h += '<div style="text-align:center;padding:40px 20px">';
    h += '<div style="font-size:56px;margin-bottom:16px">&#128640;</div>';
    h += '<h3 style="font-size:22px;font-weight:800;margin-bottom:10px">Ready to publish!</h3>';
    h += '<p style="color:var(--text-secondary);font-size:15px;max-width:400px;margin:0 auto;line-height:1.6">Your listing will go live immediately. Buyers can bid as soon as it is published.</p>';

  else h += '<button class="create-cancel-btn" onclick="closeCreateAuction()">Cancel</button>';

  else h += '<button class="create-submit-btn" onclick="publishAuction()">&#127881; Publish Listing</button>';
  h += '</div></div></div>';
  return h;
}

// ========== LIVE STREAM INTERFACE ==========
function renderLive(auctionId) {
  const a = auctions.find(x => x.id === auctionId);
  if (!a) return '';
  const nb = a.price + Math.ceil(a.price * 0.02 / 50) * 50;
  const cm = [
    {u:"collector_99",a:"#ff3d8a",t:"This piece is incredible!"},
    {u:"vintage_vault",a:"#06b6d4",t:"Can you show the back?"},
    {u:"bid_master",a:"#ff8a3d",t:"Just placed my bid!"},
    {u:"art_lover_42",a:"#10b981",t:"How much is shipping to EU?"},
    {u:a.creator.name,a:a.creator.avatar,t:"Shipping is free worldwide!"},
    {u:"sneaker_head",a:"#fbbf24",t:"Going up fast!"},
    {u:"new_bidder",a:"#8b5cf6",t:"First time here, amazing"},
  ];
  const bh = [
    {u:"collector_99",a:"#ff3d8a",am:a.price,t:"1m ago"},
    {u:"bid_master",a:"#ff8a3d",am:a.price-200,t:"3m ago"},
    {u:"vintage_vault",a:"#06b6d4",am:a.price-450,t:"5m ago"},
    {u:"art_lover_42",a:"#10b981",am:a.price-800,t:"8m ago"},
  ];
  var h = '<div class="live-overlay active">';
  h += '<div class="live-top-bar"><div class="live-top-left">';
  h += '<button class="live-close-btn" onclick="closeLive()">&#10005;</button>';
  h += '<div class="live-creator-info"><div class="live-creator-ava" style="background:'+a.creator.avatar+'">'+a.creator.initials+'</div>';
  h += '<div><div class="live-creator-name">'+a.creator.name+' '+(a.creator.verified?"&#10003;":"")+'</div>';
  h += '<div class="live-creator-followers">'+a.creator.followers+' followers</div></div></div></div>';
  h += '<div class="live-top-right"><span class="live-badge-lg"><span class="dot"></span> LIVE</span>';
  h += '<span class="live-viewer-count">&#128065; '+(a.viewers||0).toLocaleString()+'</span></div></div>';
  h += '<div class="live-body"><div class="live-video" style="background:linear-gradient(135deg,'+a.creator.avatar+'22,'+a.creator.avatar+'44)">';
  h += '<div class="live-video-bg">'+a.image+'</div>';
  h += '<div class="live-video-overlay"><div class="live-current-item">';
  h += '<div class="live-item-title">'+a.title+'</div>';
  h += '<div style="font-size:12px;color:rgba(255,255,255,0.5);margin-top:2px">'+a.creator.name+' &#183; '+a.bids+' bids</div>';
  h += '<div class="live-item-price-row"><div><div class="live-item-label">Current Bid</div>';
  h += '<div class="live-item-price">'+formatPrice(a.price)+'</div></div>';
  h += '<div class="live-item-timer">&#9201; '+a.timeLeft+'</div></div>';
  h += '<button class="live-bid-btn" onclick="placeBidLive('+a.id+')">Place Bid &#183; '+formatPrice(nb)+'</button>';
  h += '</div></div></div>';
  h += '<div class="live-sidebar"><div class="live-sidebar-tabs">';
  h += '<div class="live-sidebar-tab '+(state.liveSidebarTab==="chat"?"active":"")+'" onclick="state.liveSidebarTab=\'chat\';render();">Chat</div>';
  h += '<div class="live-sidebar-tab '+(state.liveSidebarTab==="bids"?"active":"")+'" onclick="state.liveSidebarTab=\'bids\';render();">Bid History</div></div>';
  if(state.liveSidebarTab==="chat"){
    h += '<div class="live-chat">';
    cm.forEach(function(msg){h += '<div class="live-chat-msg"><div class="live-chat-ava" style="background:'+msg.a+'">'+msg.u[0].toUpperCase()+'</div><div class="live-chat-body"><div class="live-chat-name">'+msg.u+'</div><div class="live-chat-text">'+msg.t+'</div></div></div>';});
    h += '</div><div class="live-chat-input"><input type="text" placeholder="Say something..."><button class="live-chat-send">&#10148;</button></div>';
  } else {
    h += '<div class="live-bid-history">';
    bh.forEach(function(b){h += '<div class="live-bid-entry"><div class="live-bid-user"><div class="live-bid-user-ava" style="background:'+b.a+'">'+b.u[0].toUpperCase()+'</div><div class="live-bid-user-name">'+b.u+'</div></div><div style="text-align:right"><div class="live-bid-amount">'+formatPrice(b.am)+'</div><div class="live-bid-time">'+b.t+'</div></div></div>';});
    h += '</div>';
  }
  h += '</div></div></div>';
  return h;
}

function viewCreator(id) { state.viewCreatorId = id; state.creatorTab = "listings"; state.currentPage = "creator"; render(); window.scrollTo(0,0); }
function openLive(auctionId) { state.showLive = auctionId; state.liveSidebarTab = "chat"; render(); }
function closeLive() { state.showLive = null; render(); }
function toggleFollow(id) { if(state.following.has(id)){state.following.delete(id);showToast("Unfollowed","info");}else{state.following.add(id);showToast("Following!","success");} render(); }
function placeBidLive(aid) { var a=auctions.find(function(x){return x.id===aid;}); if(a){a.price=a.price+Math.ceil(a.price*0.02/50)*50;a.bids++;showToast("Bid placed: "+formatPrice(a.price)+"!","success");render();openLive(aid);} }

// ========== GLOBAL ACTIONS ==========
function navigateTo(page) {
  state.currentPage = page;
  render();
  window.scrollTo(0, 0);
}

function toggleDarkMode() {
  state.darkMode = !state.darkMode;
  document.body.classList.toggle('dark-mode', state.darkMode);
  render();
}

function toggleWatchlist(id) {
  if (state.watchlist.has(id)) {
    state.watchlist.delete(id);
    showToast('Removed from watchlist', 'info');
  } else {
    state.watchlist.add(id);
    showToast('Added to watchlist!', 'success');
  }
  render();
}

function openDetail(id) {
  state.showAuctionDetail = id;
  render();
}

function closeDetail() {
  state.showAuctionDetail = null;
  render();
}

function placeBid(auctionId) {
  const a = auctions.find(x => x.id === auctionId);
  if (a) {
    const oldPrice = a.price;
    a.price = oldPrice + Math.ceil(oldPrice * 0.02 / 50) * 50;
    a.bids++;
    showToast(`Bid placed: ${formatPrice(a.price)}!`, 'success');
    render();
    openDetail(auctionId);
  }
}


function openCreateAuction() { state.showCreateAuction = true; state.createStep = 1; render(); }
function closeCreateAuction() { state.showCreateAuction = false; render(); }
function publishAuction() { state.showCreateAuction = false; showToast('Listing published! It is now live.', 'success'); render(); }

function logout() {
  state.isAuthenticated = false;
  state.user = null;
  state.currentPage = 'discover';
  document.body.classList.remove('dark-mode');
  state.darkMode = false;
  render();
}

// ========== BIND APP EVENTS ==========
function bindAppEvents() {
  // Category pills
  $$('.cat-pill, .nav-cat-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      const cat = btn.dataset.cat;
      if (cat) {
        state.selectedCategory = cat;
        state.currentPage = 'discover';
        render();
      }
    });
  });

  // Search
  const searchInput = $('#searchInput');
  if (searchInput) {
    searchInput.addEventListener('input', (e) => {
      state.searchQuery = e.target.value;
      if (state.currentPage === 'discover') {
        const discoverPage = $('#page-discover');
        if (discoverPage) discoverPage.innerHTML = renderDiscover();
        // Rebind pills
        $$('.cat-pill').forEach(btn => {
          btn.addEventListener('click', () => {
            state.selectedCategory = btn.dataset.cat;
            render();
          });
        });
      }
    });
  }

  // Follow buttons
  $$('.creator-follow-btn').forEach(btn => {
    btn.addEventListener('click', (e) => {
      e.stopPropagation();
      const id = parseInt(btn.dataset.creator);
      if (state.following.has(id)) {
        state.following.delete(id);
        showToast('Unfollowed', 'info');
      } else {
        state.following.add(id);
        showToast('Following!', 'success');
      }
      render();
    });
  });

  // Bid tabs
  $$('[data-bid-tab]').forEach(tab => {
    tab.addEventListener('click', () => {
      state.bidTab = tab.dataset.bidTab;
      render();
    });
  });

  // Chat selection
  $$('[data-chat]').forEach(item => {
    item.addEventListener('click', () => {
      state.selectedChat = parseInt(item.dataset.chat);
      render();
    });
  });

  // Chat send
  const chatSend = $('#chatSendBtn');
  const chatInput = $('#chatMsgInput');
  if (chatSend && chatInput) {
    const sendMsg = () => {
      const text = chatInput.value.trim();
      if (text) {
        conversations[state.selectedChat].messages.push({ from: 'me', text });
        conversations[state.selectedChat].lastMsg = text;
        conversations[state.selectedChat].time = 'now';
        chatInput.value = '';
        render();
        // Auto-scroll chat
        const chatArea = $('.chat-messages');
        if (chatArea) chatArea.scrollTop = chatArea.scrollHeight;
      }
    };
    chatSend.addEventListener('click', sendMsg);
    chatInput.addEventListener('keydown', (e) => { if (e.key === 'Enter') sendMsg(); });
  }

  // Detail overlay close
  const overlay = $('#detailOverlay');
  if (overlay) {
    overlay.addEventListener('click', (e) => {
      if (e.target === overlay) closeDetail();
    });
  }

  // Keyboard shortcuts
  document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape' && state.showLive !== null) closeLive();
    else if (e.key === 'Escape' && state.showAuctionDetail !== null) closeDetail();
  });
}

// ========== INIT ==========
// Check URL params for auth mode
const params = new URLSearchParams(window.location.search);
if (params.get('mode') === 'signup') state.authMode = 'signup';
if (params.get('mode') === 'signin') state.authMode = 'signin';

render();
</script>
